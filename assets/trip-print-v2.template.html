<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Stage 4 · 数据驱动行程印刷版（自检 demo）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C0392B;--gold:#C9A84C;--warm:#E8A020;
  --ink:#1A1A1A;--ink2:#4A4A4A;--ink3:#888;--ink4:#BBB;
  --bg:#FAFAF8;--bg2:#F4F1EC;--bg3:#ECEAE5;--border:#E2DDD6;
  --serif:'Noto Serif SC',serif;--sans:'Noto Sans SC',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:#0D0D0D;font-family:var(--sans);color:var(--ink)}
body{display:flex;flex-direction:column}
#stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
#pw{position:relative;width:1920px;height:1080px;flex-shrink:0;transform-origin:center center}
.page{position:absolute;top:0;left:0;width:1920px;height:1080px;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* NAV */
#nav-bar{flex-shrink:0;height:48px;background:#111;display:flex;align-items:center;justify-content:center;gap:20px;z-index:9999}
#nav-bar button{background:none;border:1px solid #444;color:#aaa;font-size:13px;cursor:pointer;padding:4px 16px;border-radius:3px;transition:all .15s;font-family:var(--mono)}
#nav-bar button:hover{border-color:#fff;color:#fff}
#page-dots{display:flex;gap:7px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#444;cursor:pointer;transition:all .2s}
.dot.active{background:#fff;transform:scale(1.4)}
#page-label{color:#777;font:400 11px var(--mono);min-width:260px;text-align:center}

/* ── PLACEHOLDERS ── */
.ph{display:block;overflow:hidden;position:relative;width:100%;height:100%}
.ph::after{content:attr(data-label);position:absolute;bottom:8px;left:10px;font:500 11px var(--mono);color:rgba(255,255,255,.7);letter-spacing:.04em;background:rgba(0,0,0,.4);padding:3px 9px;border-radius:3px}
.r169{aspect-ratio:16/9;width:100%;overflow:hidden}
.r43{aspect-ratio:4/3;width:100%;overflow:hidden}
.r11{aspect-ratio:1/1;width:100%;overflow:hidden}
.ph-warm{background:linear-gradient(135deg,#C9A576,#B8895A)}
.ph-green{background:linear-gradient(135deg,#7A9A78,#5E8060)}
.ph-blue{background:linear-gradient(135deg,#6E8FB5,#52749E)}
.ph-red{background:linear-gradient(135deg,#B5726E,#9E5652)}
.ph-purple{background:linear-gradient(135deg,#8878A8,#6E5E92)}
.ph-teal{background:linear-gradient(135deg,#5E9A92,#42807A)}
.ph-sand{background:linear-gradient(135deg,#BCA784,#A8916E)}
.ph-map{background:linear-gradient(135deg,#AEB9C4,#8B9AAB)}
.ph-map::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.18) 1px,transparent 1px);background-size:48px 48px}
.pin{position:absolute;width:26px;height:26px;background:var(--accent);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.pin span{transform:rotate(45deg);display:flex;width:100%;height:100%;align-items:center;justify-content:center;font:700 11px var(--mono);color:#fff}

/* ── SHARED HEADER ── */
.hdr{height:62px;display:flex;align-items:center;padding:0 44px;gap:20px;flex-shrink:0;overflow:hidden;color:#fff}
.hdr-dark{background:#1A1A1A}.hdr-accent{background:var(--accent)}.hdr-ink2{background:#27384A}
.hdr-green{background:#26402A}.hdr-warm{background:#7A4A12}.hdr-soft{background:#3A3550}
.hdr-num{font:700 10px var(--mono);letter-spacing:.3em;opacity:.5;flex-shrink:0}
.hdr-title{font:700 26px/1.1 var(--serif);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.hdr-tpl{font:600 10px var(--mono);letter-spacing:.12em;opacity:.6;flex-shrink:0;border:1px solid rgba(255,255,255,.25);padding:3px 9px;border-radius:3px}
.hdr-date{font:400 13px var(--sans);opacity:.55;flex-shrink:0}
.hdr-chips{margin-left:auto;display:flex;gap:8px;flex-shrink:0}
.chip{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 12px;font:400 11px var(--sans);white-space:nowrap}

.sec-lbl{font:600 10.5px var(--mono);letter-spacing:.25em;color:var(--ink3);text-transform:uppercase}

/* T1 */
.t1-body{flex:1;display:flex;overflow:hidden;min-width:0}
.t1-left{width:430px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);border-right:1px solid var(--border)}
.t1-map-wrap{padding:20px 20px 14px}
.t1-map{aspect-ratio:4/3;width:100%;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--border)}
.t1-rem{flex:1;min-height:0;padding:4px 22px 18px;display:flex;flex-direction:column;gap:11px;overflow:hidden}
.t1-rem .sec-lbl{margin-bottom:2px}
.t1-rem-item{display:flex;gap:9px;align-items:flex-start}
.t1-rem-item .d{width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;font:700 10px var(--sans);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.t1-rem-item span{font:400 13px/1.6 var(--sans);color:var(--ink2)}
.t1-right{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.t1-tl{flex:1;min-height:0;padding:24px 48px 16px;display:flex;flex-direction:column;gap:12px;position:relative}
.t1-tl-line{position:absolute;left:147px;top:32px;bottom:20px;width:2px;background:linear-gradient(var(--accent),rgba(192,57,43,.15))}
.t1-node{display:flex;flex:1;min-height:0;position:relative}
.t1-time{width:86px;text-align:right;flex-shrink:0;padding:16px 14px 0 0}
.t1-time b{font:700 34px/1 var(--mono);color:var(--accent);letter-spacing:-.03em;display:block}
.t1-time i{font:400 11px var(--sans);color:var(--ink3);font-style:normal;margin-top:4px;display:block}
.t1-dot{width:28px;flex-shrink:0;display:flex;justify-content:center;padding-top:22px}
.t1-dot b{width:13px;height:13px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 0 2px var(--accent);z-index:2}
.t1-dot.gold b{background:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.t1-card{flex:1;min-height:0;min-width:0;margin-left:10px;background:#fff;border:1px solid var(--border);border-radius:10px;display:flex;overflow:hidden;position:relative}
.t1-card.must{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.2)}
.t1-card .mtag{position:absolute;top:0;right:0;background:var(--gold);color:#fff;font:600 9px var(--mono);padding:3px 10px;border-radius:0 10px 0 6px}
.t1-card-img{width:200px;flex-shrink:0;aspect-ratio:unset}
.t1-card-img .ph{height:100%}
.t1-card-b{flex:1;padding:15px 22px;min-width:0;display:flex;flex-direction:column;gap:6px;justify-content:center}
.t1-card-b h3{font:700 22px/1.2 var(--serif);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t1-card-b p{font:400 14px/1.7 var(--sans);color:var(--ink2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.t1-meta{display:flex;gap:13px;font:400 13px var(--sans);color:var(--ink3);flex-wrap:wrap;margin-top:2px}
.t1-meta .b{background:var(--bg2);border-radius:3px;padding:2px 9px;font:500 11.5px var(--sans);color:var(--ink2)}
.meals{height:112px;border-top:2px solid var(--border);display:flex;flex-shrink:0;background:#fff}
.meals-lbl{width:60px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-right:1px solid var(--border)}
.meals-lbl span{font:600 9px var(--mono);letter-spacing:.2em;color:var(--ink3);writing-mode:vertical-rl;transform:rotate(180deg)}
.meal{flex:1;min-width:0;display:flex;gap:13px;align-items:center;padding:14px 20px;border-right:1px solid var(--border)}
.meal:last-child{border-right:none}
.meal-img{width:104px;flex-shrink:0;border-radius:7px;overflow:hidden}
.meal-info{flex:1;min-width:0}
.meal-info .t{font:600 11.5px var(--mono);color:var(--accent);margin-bottom:3px}
.meal-info h4{font:700 16px var(--sans);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.meal-info .s{font:400 12px var(--sans);color:var(--ink3);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.meal-info .p{font:600 13.5px var(--mono);color:var(--ink2);margin-top:4px}

/* T2 */
.t2-body{flex:1;display:flex;overflow:hidden;min-width:0}
.t2-mapcol{width:46%;flex-shrink:0;display:flex;flex-direction:column;position:relative}
.t2-map{flex:1;min-height:0;position:relative;overflow:hidden}
.t2-mapinfo{position:absolute;top:24px;left:24px;display:flex;flex-direction:column;gap:9px;z-index:3}
.t2-stat{background:rgba(26,26,26,.82);color:#fff;border-radius:6px;padding:9px 16px;display:flex;gap:12px;align-items:baseline;backdrop-filter:blur(4px)}
.t2-stat b{font:700 22px var(--mono)}
.t2-stat span{font:400 11px var(--sans);opacity:.7}
.t2-route-line{position:absolute;bottom:54px;left:8%;right:18%;height:3px;background:rgba(255,255,255,.6);z-index:2}
.t2-bottombar{height:50px;background:rgba(26,26,26,.92);display:flex;align-items:center;padding:0 26px;gap:20px;flex-shrink:0;overflow:hidden}
.t2-bottombar span{font:500 12px var(--mono);color:#bbb;white-space:nowrap}.t2-bottombar b{color:#fff}
.t2-right{flex:1;min-width:0;display:flex;flex-direction:column;padding:26px 38px;gap:18px;overflow:hidden;background:var(--bg)}
.t2-sched{background:var(--bg2);border-radius:12px;padding:22px 26px;border-left:5px solid var(--warm);flex-shrink:0}
.t2-sched h4{font:700 15.5px var(--sans);color:#7A4500;margin-bottom:16px;display:flex;gap:8px;align-items:center}
.t2-steps{display:flex;flex-direction:column;gap:11px}
.t2-step{display:flex;gap:14px;align-items:center}
.t2-step .o{width:11px;height:11px;border-radius:50%;background:var(--warm);flex-shrink:0}
.t2-step .ln{width:2px;height:14px;background:rgba(232,160,32,.35);margin-left:4.5px}
.t2-step b{font:700 16px var(--sans);color:var(--ink);min-width:86px}
.t2-step span{font:400 13.5px var(--sans);color:var(--ink2)}
.t2-step i{font:500 12px var(--mono);color:var(--ink3);margin-left:auto;font-style:normal}
.t2-arrive{flex:1;min-height:0;display:flex;flex-direction:column;gap:13px;overflow:hidden}
.t2-arrive .sec-lbl{flex-shrink:0}
.t2-arrive-row{flex:1;min-height:0;display:flex;gap:16px}
.t2-acard{flex:1;min-width:0;background:#fff;border:1px solid var(--border);border-radius:11px;overflow:hidden;display:flex;flex-direction:column}
.t2-acard .r169{flex-shrink:0}
.t2-acard-b{flex:1;min-height:0;padding:15px 18px;display:flex;flex-direction:column;gap:6px;min-width:0}
.t2-acard-b .num{font:700 12.5px var(--mono);color:var(--accent)}
.t2-acard-b h3{font:700 21px var(--serif);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t2-acard-b p{font:400 14px/1.7 var(--sans);color:var(--ink2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.t2-acard-b .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.t2-acard-b .tags span{background:var(--bg3);border-radius:3px;padding:2px 8px;font:400 10px var(--sans);color:var(--ink3)}
.t2-meal-strip{height:72px;flex-shrink:0;background:var(--bg2);border-radius:10px;display:flex;align-items:center;padding:0 8px;gap:0}
.t2-meal-strip .ml{flex:1;min-width:0;display:flex;gap:10px;align-items:center;padding:0 16px;border-right:1px solid var(--border)}
.t2-meal-strip .ml:last-child{border:none}
.t2-meal-strip .mi{width:48px;height:48px;border-radius:6px;overflow:hidden;flex-shrink:0}
.t2-meal-strip .mt{font:600 11.5px var(--mono);color:var(--accent)}
.t2-meal-strip .mn{font:700 15px var(--sans);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t2-meal-strip .ms{font:400 11.5px var(--sans);color:var(--ink3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* T3 */
.t3-stats{height:86px;background:#1C2833;display:flex;flex-shrink:0}
.t3-scell{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.1)}
.t3-scell:last-child{border:none}
.t3-scell b{font:700 30px var(--mono);color:#fff}.t3-scell b i{font-size:14px;font-style:normal;color:rgba(255,255,255,.5)}
.t3-scell span{font:400 9px var(--sans);letter-spacing:.18em;color:rgba(255,255,255,.45);text-transform:uppercase;margin-top:3px}
.t3-body{flex:1;display:flex;overflow:hidden;min-width:0}
.t3-left{width:42%;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);border-right:1px solid var(--border)}
.t3-map{flex:1;min-height:0;position:relative;overflow:hidden}
.t3-trail{position:absolute;left:12%;top:78%;width:76%;height:2px;z-index:2;background:repeating-linear-gradient(90deg,var(--accent) 0 8px,transparent 8px 14px);transform-origin:left}
.t3-side{flex-shrink:0;padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:14px}
.t3-weather{flex:1;min-width:0;background:#E8F4F8;border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:center}
.t3-weather .ic{font-size:26px}
.t3-weather b{font:700 13px var(--sans);color:#1565C0}
.t3-weather span{font:400 10px var(--sans);color:#1565C0;opacity:.8;line-height:1.5;display:block;margin-top:2px}
.t3-equip{flex:1;min-width:0}
.t3-equip h5{font:600 9px var(--mono);letter-spacing:.18em;color:var(--ink3);text-transform:uppercase;margin-bottom:7px}
.t3-eq{display:flex;gap:7px;font:400 12.5px var(--sans);color:var(--ink2);margin-bottom:4px}
.t3-eq.r::before{content:'✓';color:#2E7D32;font-weight:700}
.t3-eq:not(.r)::before{content:'○';color:var(--ink3)}
.t3-right{flex:1;min-width:0;padding:20px 34px;display:flex;flex-direction:column;gap:13px;overflow:hidden}
.t3-right .sec-lbl{flex-shrink:0}
.t3-seg{flex:1;min-height:0;background:#fff;border:1px solid var(--border);border-radius:10px;display:flex;overflow:hidden}
.t3-seg-img{width:230px;flex-shrink:0;position:relative}
.t3-seg-img .ph{height:100%}
.t3-seg-img .d{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:6px 12px;display:flex;justify-content:space-between}
.t3-seg-img .d b{font:600 12px var(--mono);color:#fff}.t3-seg-img .d i{font:400 11px var(--sans);color:rgba(255,255,255,.7);font-style:normal}
.t3-seg-b{flex:1;min-width:0;padding:15px 22px;display:flex;flex-direction:column;gap:5px;min-width:0;justify-content:center}
.t3-seg-b .t{font:600 13px var(--mono);color:var(--accent)}
.t3-seg-b h3{font:700 21px var(--sans);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t3-seg-b .g{font:500 13.5px var(--mono);color:var(--ink3)}
.t3-seg-b p{font:400 14px/1.65 var(--sans);color:var(--ink2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.t3-seg-b .sup{background:#FFF8E1;border-left:3px solid var(--warm);border-radius:0 4px 4px 0;padding:5px 11px;font:400 11px var(--sans);color:#7A4500;margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.t3-safety{height:40px;background:#E67E22;display:flex;align-items:center;padding:0 44px;font:600 12px var(--sans);color:#fff;flex-shrink:0;overflow:hidden;white-space:nowrap}

/* T4 */
.t4-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:24px 40px;gap:18px;position:relative}
.t4-top{display:flex;gap:24px;flex-shrink:0;align-items:stretch}
.t4-intro{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:8px}
.t4-intro .k{font:600 10px var(--mono);letter-spacing:.2em;color:var(--accent);text-transform:uppercase}
.t4-intro h2{font:700 28px/1.2 var(--serif);color:var(--ink)}
.t4-intro p{font:400 14.5px/1.8 var(--sans);color:var(--ink2);max-width:70ch;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.t4-minimap{width:300px;flex-shrink:0;aspect-ratio:4/3;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--border)}
.t4-minimap .lbl{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.85);border-radius:3px;padding:3px 9px;font:600 9px var(--mono);color:var(--ink2);z-index:3}
.t4-grid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:16px 20px}
.t4-cell{background:#fff;border:1px solid var(--border);border-radius:11px;overflow:hidden;display:flex;min-height:0}
.t4-cell-img{width:32%;flex-shrink:0;position:relative}
.t4-cell-img .ph{height:100%}
.t4-cell-img .t{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.72);color:#fff;font:600 13px var(--mono);padding:5px 12px;border-radius:5px;z-index:2}
.t4-cell-b{flex:1;min-width:0;padding:18px 22px;display:flex;flex-direction:column;gap:8px;min-width:0;justify-content:center}
.t4-cell-b h3{font:700 21px var(--serif);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t4-cell-b p{font:400 14px/1.75 var(--sans);color:var(--ink2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.t4-cell-b .f{display:flex;justify-content:space-between;align-items:center;font:400 12.5px var(--sans);color:var(--ink3);padding-top:11px;border-top:1px solid var(--border);margin-top:4px}
.t4-cell-b .f b{font:600 15px var(--mono);color:var(--accent)}
.t4-mealbar{height:78px;flex-shrink:0;background:var(--bg2);border-radius:10px;display:flex;align-items:center;padding:0 6px}
.t4-mealbar .l{font:600 9px var(--mono);letter-spacing:.2em;color:var(--ink3);writing-mode:vertical-rl;transform:rotate(180deg);padding:0 12px}
.t4-mealbar .ml{flex:1;min-width:0;display:flex;gap:11px;align-items:center;padding:0 18px;border-left:1px solid var(--border)}
.t4-mealbar .mi{width:52px;height:52px;border-radius:7px;overflow:hidden;flex-shrink:0}
.t4-mealbar .mt{font:600 11.5px var(--mono);color:var(--accent)}
.t4-mealbar .mn{font:700 15px var(--sans);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t4-mealbar .ms{font:400 11.5px var(--sans);color:var(--ink3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* loose foot */
.loose-foot{height:150px;flex-shrink:0;display:flex;border-top:2px solid var(--border);background:#fff}
.lf-half{flex:1;min-width:0;display:flex;flex-direction:column;padding:16px 36px;gap:10px}
.lf-half:first-child{border-right:1px solid var(--border)}
.lf-half h5{font:600 10px var(--mono);letter-spacing:.2em;color:var(--ink3);text-transform:uppercase}
.lf-meals{display:flex;gap:14px;flex:1;min-height:0}
.lf-meal{flex:1;min-width:0;display:flex;gap:10px;align-items:center}
.lf-meal .mi{width:54px;height:54px;border-radius:7px;overflow:hidden;flex-shrink:0}
.lf-meal .mt{font:600 11.5px var(--mono);color:var(--accent)}
.lf-meal .mn{font:700 15px var(--sans);color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.lf-meal .ms{font:400 11.5px var(--sans);color:var(--ink3);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.lf-meal .mp{font:600 12.5px var(--mono);color:var(--ink2);margin-top:2px}
.lf-transit{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;justify-content:center}

/* ════════════════════════════════════════════════════════════════
   内联选择器 selectPagesForDay（照搬 /tmp/stage4-selector.js）
   ════════════════════════════════════════════════════════════════ */
function parseHours(str){
  if(str==null)return null;
  if(typeof str==='number')return str;
  const s=String(str).trim();
  let m=s.match(/([\d.]+)\s*(分钟|分|min)/i); if(m)return parseFloat(m[1])/60;
  m=s.match(/([\d.]+)\s*(小时|时|h|hour)/i); if(m)return parseFloat(m[1]);
  m=s.match(/^([\d.]+)$/); if(m)return parseFloat(m[1]);
  return null;
}
function typeToCategory(type){
  switch(type){
    case 'sight':return 'sightseeing';
    case 'sight_cultural':return 'culture';
    case 'sight_nature':case 'experience_outdoor':return 'outdoor';
    case 'meal_breakfast':case 'meal_lunch':case 'meal_dinner':case 'meal_snack':case 'experience_food':return 'food';
    case 'shop':return 'shopping';
    case 'experience':return 'experience';
    case 'venue':return 'venue';
    case 'free':return 'experience';
    default:return null;
  }
}
function isPoint(item){
  if(!item)return false;
  const t=item.type;
  const alwaysPoint=new Set(['sight','sight_cultural','sight_nature','experience','experience_outdoor','experience_food','venue','free','shop']);
  if(alwaysPoint.has(t))return true;
  const conditional=t==='hotel'||(typeof t==='string'&&t.startsWith('meal_'));
  if(conditional){
    if(item.must_visit===true)return true;
    if(item.intent==='flagship'||item.intent==='signature')return true;
    return false;
  }
  return false;
}
function getCoords(item){
  if(!item)return null;
  if(Array.isArray(item.coords)&&item.coords.length===2)return item.coords;
  if(item.card&&Array.isArray(item.card.coords)&&item.card.coords.length===2)return item.card.coords;
  return null;
}
function isHomogeneous(points){
  const cats=points.map(p=>typeToCategory(p.type)).filter(Boolean);
  if(cats.length===0)return false;
  const counts={};
  for(const c of cats)counts[c]=(counts[c]||0)+1;
  const max=Math.max(...Object.values(counts));
  return max/cats.length>=0.8;
}
function haversineKm(a,b){
  const R=6371,toRad=d=>d*Math.PI/180;
  const dLat=toRad(b[0]-a[0]),dLng=toRad(b[1]-a[1]),lat1=toRad(a[0]),lat2=toRad(b[0]);
  const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function maxPairwiseKm(points){
  const withCoords=[];let missing=0;
  for(const p of points){const c=getCoords(p);if(c)withCoords.push(c);else missing++;}
  if(missing>1)return null;
  if(withCoords.length<2)return 0;
  let max=0;
  for(let i=0;i<withCoords.length;i++)for(let j=i+1;j<withCoords.length;j++){const d=haversineKm(withCoords[i],withCoords[j]);if(d>max)max=d;}
  return max;
}
function isCompact(points,day){
  const max=maxPairwiseKm(points);
  if(max===null)return day&&day.compact_area===true;
  return max<=1.5;
}
function isLongHike(item){
  if(!item)return false;
  const h=parseHours(item.duration);
  if(h==null)return false;
  return h>=3;
}
function hikeKind(day){
  if(!day||!Array.isArray(day.timeline))return null;
  const hike=day.timeline.find(t=>t.type==='experience_outdoor');
  if(!hike)return null;
  const h=parseHours(hike.duration);
  if(h==null)return null;
  let total=0,otherDuration=0;
  for(const t of day.timeline){const th=parseHours(t.duration);if(th!=null){total+=th;if(t!==hike)otherDuration+=th;}}
  const ratioReliable=otherDuration>0;
  const ratio=total>0?h/total:0;
  if(h>=5)return 'whole';
  if(ratioReliable&&ratio>0.6)return 'whole';
  if(h>=3)return 'half';
  return null;
}
function balancedSizes(n,pages){
  const base=Math.floor(n/pages);let rem=n-base*pages;const sizes=[];
  for(let i=0;i<pages;i++){sizes.push(base+(rem>0?1:0));if(rem>0)rem--;}
  return sizes;
}
function splitPages(points,tpl){
  const N=points.length,maxPerPage=5,pages=Math.max(1,Math.ceil(N/maxPerPage));
  const sizes=balancedSizes(N,pages);const result=[];let idx=0;
  for(const sz of sizes){result.push({template:tpl,points:points.slice(idx,idx+sz)});idx+=sz;}
  return result;
}
function selectInCity(points){
  const n=points.length;
  if(n===0)return [];
  if(n<=3){const tpl=n===1?'T5':n===2?'T6':'T7';return [{template:tpl,points:points.slice()}];}
  const tpl=(isHomogeneous(points)||isCompact(points,points.__day))?'T4':'T1';
  return splitPages(points,tpl);
}
function mealCategoryForPage(pageIndex,totalPages){const half=totalPages/2;return pageIndex<half?'upper':'lower';}
function attachMeals(pages,day){
  if(!day||!day.meals)return pages;
  const total=pages.length;const{breakfast,lunch,dinner}=day.meals;
  for(let i=0;i<total;i++){
    const slot=mealCategoryForPage(i,total);const meals={};
    if(slot==='upper'){if(breakfast)meals.breakfast=breakfast;if(lunch)meals.lunch=lunch;}
    else{if(dinner)meals.dinner=dinner;}
    if(total===1){if(breakfast)meals.breakfast=breakfast;if(lunch)meals.lunch=lunch;if(dinner)meals.dinner=dinner;}
    if(Object.keys(meals).length)pages[i].meals=meals;
  }
  return pages;
}
function selectPagesForDay(day){
  if(!day||!Array.isArray(day.timeline))return [{template:'T8',role:'rest'}];
  const timeline=day.timeline;
  const points=timeline.filter(isPoint);
  points.__day=day;
  const crossSegs=timeline.filter(t=>t.type==='transit'&&t.intent==='intercity');
  const hasSubstance=points.length>0||day.timeline.some(t=>t.type==='experience_outdoor'||t.type==='free');
  if(!hasSubstance)return [{template:'T8',role:'rest'}];
  if(crossSegs.length>=2&&points.length<=1)return attachMeals([{template:'T2',role:'transfer',points:points.slice()}],day);
  if(crossSegs.length>=1){
    const lastCrossIdx=timeline.lastIndexOf(crossSegs[crossSegs.length-1]);
    const landing=timeline.slice(lastCrossIdx+1).filter(isPoint);
    landing.__day=day;
    if(landing.length<=2){const page={template:'T2',role:'transfer',points:landing.slice()};return attachMeals([page],day);}
    const t2={template:'T2',role:'transfer',points:[]};
    const cityPages=selectInCity(landing).map(p=>({...p,role:'in_city'}));
    return attachMeals([t2,...cityPages],day);
  }
  const kind=hikeKind(day);
  if(kind==='whole'){
    const page={template:'T3',role:'hike'};
    if(day.on_trail_food&&day.on_trail_food.has_food)page.supply_points=day.on_trail_food.supply_points||[];
    return [page];
  }
  if(kind==='half'){
    const hike=timeline.find(t=>t.type==='experience_outdoor');
    const rest=points.filter(p=>p!==hike);rest.__day=day;
    const t3={template:'T3',role:'hike'};
    if(day.on_trail_food&&day.on_trail_food.has_food)t3.supply_points=day.on_trail_food.supply_points||[];
    const cityPages=selectInCity(rest).map(p=>({...p,role:'in_city'}));
    return attachMeals([t3,...cityPages],day);
  }
  const cityPages=selectInCity(points).map(p=>({...p,role:'in_city'}));
  return attachMeals(cityPages,day);
}

const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const HDR_CLS={T1:'hdr-dark',T2:'hdr-ink2',T3:'hdr-green',T4:'hdr-warm',T5:'hdr-accent',T6:'hdr-soft',T7:'hdr-soft',T8:'hdr-dark'};

/* ── 出行须知（贯穿约束 · 收下全部 scope，按 type 分组）──
   主出口：trip / region:slug / day:N 三种 scope 的约束全部纳入，一条不丢。
   region/day 级在文字前标注适用范围（【第N天】/【region名】），保证读者知道约束何时生效。*/
const CSTR_TYPE={
  health:{ic:'🏥',label:'健康'}, safety:{ic:'🌙',label:'安全'}, family:{ic:'👨‍👩‍👧',label:'同行'}, budget:{ic:'💰',label:'预算'},
  season:{ic:'🌦',label:'季节天气'}, transport:{ic:'🚐',label:'交通'}, theme:{ic:'🎬',label:'主题朝圣'}, other:{ic:'📌',label:'其他'}
};
const CSTR_ORDER=['health','safety','family','season','transport','budget','theme','other'];
// scope → 适用范围中文前缀。day:N → 【第N天】；region slug → 【region名】。
// region 名映射缺失时降级显示 slug 原文（如「【hualien】」）—— TRIP 数据无 region slug→中文名表，
// 约束 text 本身应自带地名作为兜底；若日后补 region 映射，在此接入即可。
function cstrScopePrefix(scope){
  if(!scope||scope==='trip') return '';                       // 全程级：无前缀
  const dm=/^day:(\d+)$/.exec(scope);
  if(dm) return `【第${dm[1]}天】`;                            // day:3 → 【第3天】
  return `【${scope}】`;                                       // region slug 原文降级（如 hualien → 【hualien】）
}
function renderConstraintsBanner(){
  const all=(TRIP.meta&&TRIP.meta.constraints)||[];
  if(!all.length) return '';
  const groups={};
  all.forEach(c=>{                                            // 全部 scope 纳入，不再过滤
    const t=CSTR_TYPE[c.type]?c.type:'other';
    (groups[t]=groups[t]||[]).push(cstrScopePrefix(c.scope)+(c.text||''));
  });
  const cells=CSTR_ORDER.filter(t=>groups[t]).map(t=>{
    const m=CSTR_TYPE[t];
    return `<div class="apx-warn-grp"><div class="gt"><span class="ic">${m.ic}</span>${esc(m.label)}</div>${
      groups[t].map(tx=>`<div class="apx-warn-item">${esc(tx)}</div>`).join('')}</div>`;
  }).join('');
  return `<div class="apx-warn">
    <div class="apx-warn-hd"><b>⚠ 出行须知</b><em>Trip-wide Notes · 全程把关</em></div>
    <div class="apx-warn-row">${cells}</div>
  </div>`;
}

/* ── 图文内容页：特产 / 备选美食 / 备选景点（共用 souvenir-card 式图文卡） ── */
// 均衡分行：5→[3,2]、6→[3,3]、7→[3,2,2]，绝不出现 4+1 这种落单
function balancedRows(items,maxPerRow){
  const n=items.length;if(!n)return[];
  const rows=Math.ceil(n/maxPerRow),base=Math.floor(n/rows),extra=n%rows;
  const out=[];let i=0;
  for(let r=0;r<rows;r++){const c=base+(r<extra?1:0);out.push(items.slice(i,i+c));i+=c;}
  return out;
}
// 地址 → 可跳转地图链接（CN 走高德，其他走 Google Maps）
function mapHref(q){
  const cc=(TRIP.meta&&TRIP.meta.country_code)||'CN',kw=encodeURIComponent(q||'');
  return cc==='CN'?`https://uri.amap.com/search?keyword=${kw}`:`https://www.google.com/maps/search/?api=1&query=${kw}`;
}
function renderGallery(num,title,sub,items){
  const rows=balancedRows(items,3).map(row=>`<div class="gx-row">${row.map(it=>`
    <div class="gx-card">
      <div class="gx-img"><div class="em">${it.emoji||''}</div><div class="ph ${it.ph||'ph-sand'}"></div></div>
      <div class="gx-b">
        <h3>${esc(it.name)}</h3>
        <p>${esc(it.intro)}</p>
        <div class="gx-meta"><a href="${mapHref(it.where||it.name)}" target="_blank" rel="noopener">📍 ${esc(it.where||'查看地图')}</a><span class="p">${esc(it.price||'')}</span>${it.note?`<span class="nt">${esc(it.note)}</span>`:''}</div>
      </div>
    </div>`).join('')}</div>`).join('');
  return `<div class="page">
    <div class="hdr hdr-dark"><span class="hdr-num">${num}</span><span class="hdr-title">${title}</span><span class="hdr-tpl">图文页</span><div class="hdr-chips"><span class="chip">${sub}</span></div></div>
    <div class="gx-body">${rows}</div></div>`;
}
function renderBackupSights(){const e=TRIP.extras;return(e&&e.backup_sights&&e.backup_sights.length)?renderGallery('EXTRA SIGHTS','备选景点 · 想加码时','按需补充 · 非固定行程',e.backup_sights):'';}
function renderBackupFood(){const e=TRIP.extras;return(e&&e.backup_food&&e.backup_food.length)?renderGallery('EXTRA FOOD','备选美食 · 想换口味时','按需补充 · 非固定行程',e.backup_food):'';}
function renderSouvenirs(){const e=TRIP.extras;return(e&&e.souvenirs&&e.souvenirs.length)?renderGallery('SOUVENIRS','特产 · 带回家的当地味道','离开前采买',e.souvenirs):'';}

/* ════════════════════════════════════════════════════════════════
   渲染流程
   ════════════════════════════════════════════════════════════════ */
const RENDERERS={T1:renderT1,T2:renderT2,T3:renderT3,T4:renderT4,T5:renderT5,T6:(d,p)=>renderTN(d,p,'T6'),T7:(d,p)=>renderTN(d,p,'T7'),T8:renderT8};
const planList=TRIP.days.map(d=>selectPagesForDay(d));
let html='';
const LABELS=[];
html+=renderCover();LABELS.push('封面 Cover');
html+=renderOverview(planList);LABELS.push('总览 Overview');
TRIP.days.forEach((day,di)=>{
  planList[di].forEach((page,pi)=>{
    html+=RENDERERS[page.template](day,page);
    const multi=planList[di].length>1?` (${pi+1}/${planList[di].length})`:'';
    LABELS.push(`D${day.num} · ${TPL_LBL[page.template]}${multi}`);
  });
});
const bs=renderBackupSights();if(bs){html+=bs;LABELS.push('备选景点 Extra Sights');}
const bf=renderBackupFood();if(bf){html+=bf;LABELS.push('备选美食 Extra Food');}
const sv=renderSouvenirs();if(sv){html+=sv;LABELS.push('特产 Souvenirs');}
html+=renderAppendix();LABELS.push('附录 Appendix');
document.getElementById('pw').innerHTML=html;

/* nav + fit */
const pages=[...document.querySelectorAll('.page')],dots=document.getElementById('page-dots'),label=document.getElementById('page-label');
let cur=0;
pages.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i?'':' active');d.onclick=()=>show(i);dots.appendChild(d);});
function show(n){pages[cur].classList.remove('active');dots.children[cur].classList.remove('active');cur=(n+pages.length)%pages.length;pages[cur].classList.add('active');dots.children[cur].classList.add('active');label.textContent=`${cur+1} / ${pages.length} · ${LABELS[cur]}`;}
function go(d){show(cur+d)}
window.go=go;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1)});
show(0);
function fit(){const pw=document.getElementById('pw'),st=document.getElementById('stage');if(!pw||!st)return;pw.style.transform='scale('+Math.min(st.clientWidth/1920,st.clientHeight/1080,1)+')';}
window.addEventListener('resize',fit);fit();
// 调试入口：截图脚本据此关闭缩放并逐页激活
window.__deck={pages,LABELS,planList};
</script>
