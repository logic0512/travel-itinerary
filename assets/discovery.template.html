/* ===== Responsive ===== */
@media (max-width: 900px) {
  .overview-body { grid-template-columns: 1fr; }
  .tips-grid { grid-template-columns: repeat(2, 1fr); }
  .card-grid-2col { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 0; }
  #site-header { padding: 0 16px; }
  #city-nav { padding: 0 16px; }
  #bottom-bar { padding: 0 16px; }
  .tips-grid { grid-template-columns: 1fr 1fr; }
  .header-left h1 { font-size: 14px; }
}

/* Hidden utility */
.hidden { display: none !important; }
</style>
</head>

<body>

<!-- ===== Fixed Header ===== -->
<header id="site-header">
  <div class="header-left">
    <h1>目的地发现手册</h1>
    <div class="subtitle" id="header-subtitle">加载中…</div>
  </div>
  <div class="header-right">
    <div class="selection-count">已选 <span id="hd-selected">0</span> 个 / 总 <span id="hd-total">0</span> 个</div>
    <button class="btn-export-header" onclick="openExportModal()">导出我的选择</button>
  </div>
</header>

<!-- ===== City Tab Nav ===== -->
<nav id="city-nav"></nav>

<!-- ===== Main ===== -->
<main id="main-content"></main>

<!-- ===== Bottom Bar ===== -->
<div id="bottom-bar">
  <div class="bar-stats">
    <div class="stat-item must">
      <span style="font-size:16px">★</span>
      <div>
        <div class="stat-num" id="bar-must">0</div>
        <div style="font-size:10px;color:var(--fg-subtle)">必去</div>
      </div>
    </div>
    <div class="stat-item interest">
      <span style="font-size:16px">♡</span>
      <div>
        <div class="stat-num" id="bar-interest">0</div>
        <div style="font-size:10px;color:var(--fg-subtle)">感兴趣</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--fg-subtle);margin-left:8px">
      共 <span id="bar-total">0</span> 项内容
    </div>
  </div>
  <button class="btn-export" onclick="openExportModal()">导出我的选择</button>
</div>

<!-- ===== Export Modal ===== -->
<div class="modal-overlay" id="export-modal" onclick="handleModalClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">导出选择结果</div>
      <button class="modal-close" onclick="closeExportModal()">✕</button>
    </div>
    <div class="modal-body">
      <pre id="export-json"></pre>
    </div>
    <div class="modal-footer">
      <button class="btn-copy" id="copy-btn" onclick="copyToClipboard()">复制到剪贴板</button>
      <button class="btn-export" onclick="closeExportModal()">关闭</button>
    </div>
  </div>
</div>

<!-- ===== JavaScript ===== -->
<script>
// ===== State =====
const STORAGE_KEY = 'discovery_selections';
let selections = {};  // { [id]: 'must' | 'interest' | 'skip' | null }
let allItems = [];    // flat list of all cards with metadata

// ===== Load from localStorage =====
function loadSelections() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) selections = JSON.parse(raw);
  } catch(e) { selections = {}; }
}

function saveSelections() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
}

// ===== Mark Card =====
function markCard(id, mark) {
  const current = selections[id];
  // Toggle off if clicking the same state
  if (current === mark) {
    delete selections[id];
  } else {
    selections[id] = mark;
  }
  saveSelections();
  applyCardState(id);
  updateCounts();
}

function applyCardState(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  const mark = selections[id] || null;

  // Remove all mark classes
  card.classList.remove('mark-must', 'mark-interest', 'mark-skip');
  if (mark) card.classList.add(`mark-${mark}`);

  // Update buttons
  const btnMust = card.querySelector('.mark-btn[data-mark="must"]');
  const btnInterest = card.querySelector('.mark-btn[data-mark="interest"]');
  const btnSkip = card.querySelector('.mark-btn[data-mark="skip"]');

  if (btnMust) btnMust.classList.toggle('active-must', mark === 'must');
  if (btnInterest) btnInterest.classList.toggle('active-interest', mark === 'interest');
  if (btnSkip) btnSkip.classList.toggle('active-skip', mark === 'skip');
}

// ===== Count Update =====
function updateCounts() {
  let must = 0, interest = 0, total = allItems.length;
  for (const id of allItems.map(i => i.id)) {
    const m = selections[id];
    if (m === 'must') must++;
    if (m === 'interest') interest++;
  }
  const selected = must + interest;

  document.getElementById('hd-selected').textContent = selected;
  document.getElementById('hd-total').textContent = total;
  document.getElementById('bar-must').textContent = must;
  document.getElementById('bar-interest').textContent = interest;
  document.getElementById('bar-total').textContent = total;
}

// ===== Filter =====
function filterCards(gridId, category) {
  const grid = document.getElementById(gridId);
  if (!grid) return;
  const cards = grid.querySelectorAll('[data-category]');
  cards.forEach(card => {
    const cat = card.getAttribute('data-category');
    card.style.display = (category === 'all' || cat === category) ? '' : 'none';
  });
}

function activateFilter(btn, gridId, category) {
  const bar = btn.closest('.filter-bar');
  bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards(gridId, category);
}

// ===== City Tab =====
function switchCity(cityId) {
  document.querySelectorAll('.city-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.city === cityId);
  });
  document.querySelectorAll('.city-panel').forEach(p => {
    p.classList.toggle('active', p.dataset.city === cityId);
  });
}

// ===== Export =====
function openExportModal() {
  const data = DEMO_DATA; // AI 替换时改为实际数据对象
  const must = [], interested = [];

  for (const item of allItems) {
    const m = selections[item.id];
    if (m === 'must') must.push({ id: item.id, name: item.name, type: item.type, city: item.city, category: item.category });
    if (m === 'interest') interested.push({ id: item.id, name: item.name, type: item.type, city: item.city, category: item.category });
  }

  const output = {
    destination: data.destination,
    exported_at: new Date().toLocaleString('zh-CN'),
    must_visit: must,
    interested: interested,
    total_selected: must.length + interested.length
  };

  document.getElementById('export-json').textContent = JSON.stringify(output, null, 2);
  document.getElementById('export-modal').classList.add('open');
}

function closeExportModal() {
  document.getElementById('export-modal').classList.remove('open');
  const btn = document.getElementById('copy-btn');
  btn.textContent = '复制到剪贴板';
  btn.classList.remove('copied');
}

function handleModalClick(e) {
  if (e.target === e.currentTarget) closeExportModal();
}

function copyToClipboard() {
  const text = document.getElementById('export-json').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制到剪贴板';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ===== HTML Builders =====
function buildMarkBtns(id) {
  return `<div class="mark-btns">
    <button class="mark-btn" data-mark="must" title="★ 必去" onclick="markCard('${id}','must')">★</button>
    <button class="mark-btn" data-mark="interest" title="♡ 感兴趣" onclick="markCard('${id}','interest')">♡</button>
    <button class="mark-btn" data-mark="skip" title="— 跳过" onclick="markCard('${id}','skip')">—</button>
  </div>`;
}

function buildInfoRow(items) {
  return `<div class="info-row">${items.map(i =>
    `<div class="info-item"><span class="icon">${i.icon}</span><span class="val">${i.val}</span></div>`
  ).join('')}</div>`;
}

function buildSpotCard(spot) {
  return `
<div class="item-card" data-id="${spot.id}" data-category="${spot.category}">
  ${buildMarkBtns(spot.id)}
  <img class="card-img" src="${spot.img}" alt="${spot.name}" loading="lazy" onerror="this.style.background='#E5E3DC'">
  <div class="card-body">
    <div class="card-name">${spot.name}</div>
    <div class="card-meta">
      <span class="tag-district">${spot.district}</span>
      <span class="tag-category">${spot.categoryLabel}</span>
    </div>
    <p class="card-desc">${spot.desc}</p>
    ${buildInfoRow([
      { icon: '⏱', val: spot.duration },
      { icon: '💴', val: spot.ticket },
      { icon: '🕐', val: spot.hours },
      { icon: '📅', val: spot.closed }
    ])}
    ${spot.note ? `<div class="card-note">${spot.note}</div>` : ''}
  </div>
</div>`;
}

function buildFoodCard(food) {
  const mustItems = food.mustOrder.map(m =>
    `<li class="must-order-item">${m.name} <span class="dish-note">— ${m.note}</span></li>`
  ).join('');
  return `
<div class="item-card" data-id="${food.id}" data-category="${food.category}">
  ${buildMarkBtns(food.id)}
  <img class="card-img" src="${food.img}" alt="${food.name}" loading="lazy" onerror="this.style.background='#E5E3DC'">
  <div class="card-body">
    <div class="card-name">${food.name}</div>
    <div class="card-meta">
      <span class="tag-district">${food.district}</span>
      <span class="tag-category">${food.categoryLabel}</span>
    </div>
    <p class="card-desc">${food.desc}</p>
    <div class="must-order">
      <div class="must-order-title">必点</div>
      <ul class="must-order-list">${mustItems}</ul>
    </div>
    ${buildInfoRow([
      { icon: '💴', val: food.perPerson + '/人' },
      { icon: '🕐', val: food.hours },
      { icon: '📅', val: food.closed },
      { icon: '📞', val: food.reservation }
    ])}
  </div>
</div>`;
}

function buildExpCard(exp) {
  return `
<div class="exp-card" data-id="${exp.id}" data-category="exp">
  ${buildMarkBtns(exp.id)}
  <img class="exp-img" src="${exp.img}" alt="${exp.name}" loading="lazy" onerror="this.style.background='#E5E3DC'">
  <div class="exp-body">
    <div class="exp-name">${exp.name}</div>
    <div class="exp-tag-time">${exp.tag}</div>
    <p class="exp-desc">${exp.desc}</p>
    ${buildInfoRow([
      { icon: '⏱', val: exp.duration },
      { icon: '💴', val: exp.price },
      { icon: '📅', val: exp.timeLimit },
      { icon: '📞', val: exp.reservation }
    ])}
  </div>
</div>`;
}

function buildCityPanel(cityId, data) {
  const spots = (data.spots[cityId] || []);
  const foods = (data.foods[cityId] || []);
  const exps = (data.experiences[cityId] || []);
  const districts = (data.districts[cityId] || []);

  // Register all items
  spots.forEach(s => allItems.push({ id: s.id, name: s.name, type: 'spot', city: cityId, category: s.category }));
  foods.forEach(f => allItems.push({ id: f.id, name: f.name, type: 'food', city: cityId, category: f.category }));
  exps.forEach(e => allItems.push({ id: e.id, name: e.name, type: 'experience', city: cityId, category: 'exp' }));

  // District cards
  const districtCards = districts.map(d => `
<div class="district-card">
  <img class="district-img" src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.style.background='#E5E3DC'">
  <div class="district-info">
    <div class="district-name">${d.name}</div>
    <div class="district-tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <p class="district-desc">${d.desc}</p>
  </div>
</div>`).join('');

  // Spot filter categories
  const spotCats = [...new Set(spots.map(s => s.category))];
  const spotFilterBtns = `
<button class="filter-btn active" onclick="activateFilter(this, 'spots-grid-${cityId}', 'all')">全部</button>
${spotCats.includes('culture') ? `<button class="filter-btn" onclick="activateFilter(this, 'spots-grid-${cityId}', 'culture')">文化历史</button>` : ''}
${spotCats.includes('nature') ? `<button class="filter-btn" onclick="activateFilter(this, 'spots-grid-${cityId}', 'nature')">自然风光</button>` : ''}
${spotCats.includes('landmark') ? `<button class="filter-btn" onclick="activateFilter(this, 'spots-grid-${cityId}', 'landmark')">城市地标</button>` : ''}
${spotCats.includes('hidden') ? `<button class="filter-btn" onclick="activateFilter(this, 'spots-grid-${cityId}', 'hidden')">小众冷门</button>` : ''}`;

  // Food filter categories
  const foodCats = [...new Set(foods.map(f => f.category))];
  const foodFilterBtns = `
<button class="filter-btn active" onclick="activateFilter(this, 'foods-grid-${cityId}', 'all')">全部</button>
${foodCats.includes('local') ? `<button class="filter-btn" onclick="activateFilter(this, 'foods-grid-${cityId}', 'local')">当地招牌</button>` : ''}
${foodCats.includes('street') ? `<button class="filter-btn" onclick="activateFilter(this, 'foods-grid-${cityId}', 'street')">街头小吃</button>` : ''}
${foodCats.includes('restaurant') ? `<button class="filter-btn" onclick="activateFilter(this, 'foods-grid-${cityId}', 'restaurant')">餐馆</button>` : ''}
${foodCats.includes('dessert') ? `<button class="filter-btn" onclick="activateFilter(this, 'foods-grid-${cityId}', 'dessert')">甜品饮料</button>` : ''}`;

  // Season cards
  const seasonCards = data.seasons.map(s => `
<div class="season-card ${s.best ? 'best' : ''}">
  <span class="season-name">${s.name}</span>
  <span class="season-months">${s.months}</span>
  <p class="season-desc">${s.desc}</p>
  ${s.best ? '<span class="season-badge">推荐出行</span>' : ''}
</div>`).join('');

  // Tips
  const tips = data.tips;
  const tipsHtml = Object.values(tips).map(tip => `
<div class="tip-col">
  <div class="tip-header">
    <span class="tip-icon">${tip.icon}</span>
    <span class="tip-title">${tip.title}</span>
  </div>
  <ul class="tip-list">${tip.items.map(item => `<li>${item}</li>`).join('')}</ul>
</div>`).join('');

  return `
<div class="city-panel ${cityId === data.cities[0].id ? 'active' : ''}" data-city="${cityId}">
  <div class="container">

    <!-- Section 1: Overview -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">目的地概览</h2>
        <span class="section-sub">了解这座城市的气质与节奏</span>
      </div>
      <div class="overview-body">
        <div>
          <p class="overview-text">${data.cityAtmosphere}</p>
          ${data.currentAlert ? `<div class="alert-box">${data.currentAlert}</div>` : ''}
        </div>
        <div>
          <div class="seasons-grid">${seasonCards}</div>
        </div>
      </div>
    </section>

    <!-- Section 2: Districts -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">片区导读</h2>
        <span class="section-sub">找到属于你的城市切面</span>
      </div>
      <div class="district-grid">${districtCards}</div>
    </section>

    <!-- Section 3: Spots -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">景点库</h2>
        <span class="section-sub">${spots.length} 个景点 · 标记你的选择</span>
      </div>
      <div class="filter-bar">${spotFilterBtns}</div>
      <div class="card-grid" id="spots-grid-${cityId}">
        ${spots.map(buildSpotCard).join('')}
      </div>
    </section>

    <!-- Section 4: Foods -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">美食库</h2>
        <span class="section-sub">${foods.length} 个推荐 · 标记你的选择</span>
      </div>
      <div class="filter-bar">${foodFilterBtns}</div>
      <div class="card-grid" id="foods-grid-${cityId}">
        ${foods.map(buildFoodCard).join('')}
      </div>
    </section>

    <!-- Section 5: Experiences -->
    ${exps.length > 0 ? `
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">独有体验</h2>
        <span class="section-sub">只有这里才能做的事</span>
      </div>
      <div class="card-grid-2col">
        ${exps.map(buildExpCard).join('')}
      </div>
    </section>` : ''}

    <!-- Section 6: Tips -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">实用提示</h2>
        <span class="section-sub">出行前必读</span>
      </div>
      <div class="tips-grid">${tipsHtml}</div>
    </section>

  </div>
</div>`;
}

// ===== Init =====
function init() {
  const data = DEMO_DATA;
  loadSelections();

  // Header subtitle
  document.getElementById('header-subtitle').textContent =
    `${data.destination} · ${data.days}天 · ${data.travelers}`;

  // City nav
  const nav = document.getElementById('city-nav');
  const isSingle = data.cities.length <= 1;
  if (isSingle) {
    nav.classList.add('single-city');
    document.body.style.paddingTop = 'calc(var(--header-h))';
  } else {
    data.cities.forEach(city => {
      const btn = document.createElement('button');
      btn.className = 'city-tab' + (city.id === data.cities[0].id ? ' active' : '');
      btn.dataset.city = city.id;
      btn.textContent = `${city.name}`;
      btn.onclick = () => switchCity(city.id);
      nav.appendChild(btn);
    });
  }

  // Build panels
  const main = document.getElementById('main-content');
  data.cities.forEach(city => {
    main.innerHTML += buildCityPanel(city.id, data);
  });

  // Apply saved states
  allItems.forEach(item => applyCardState(item.id));
  updateCounts();
}

// Run immediately if DOM is ready, else wait
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
