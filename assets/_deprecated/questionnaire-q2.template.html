<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">Q2 v2.3 · 锁定行程</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f6f1ea; --fg: #2a241c; --muted: #7a6e58; --line: #d8cfb8;
  --card: #fffaf3; --hot-red: #c9362e; --hot-red-dark: #9d2a23;
  --ink-green: #4a7556; --ink-green-dark: #355441;
  --river-blue: #5a89a6; --gold: #c79b3c;
  --warn-bg: #fff3cd; --warn-border: #e8a93c;
  --danger: #b53129; --ok: #4a7556;
}
html { scroll-behavior: smooth; scroll-padding-top: 60px; }
body {
  font: 15px/1.65 "Songti SC", "SimSun", "Noto Serif TC", Georgia, serif;
  color: var(--fg); background: var(--bg);
  max-width: 560px; margin: 0 auto; padding-bottom: 80px;
}

/* 顶栏 · 非 sticky */
header.top {
  background: linear-gradient(135deg, var(--hot-red), var(--hot-red-dark));
  color: #fff8e0; padding: 14px 16px; border-bottom: 3px solid var(--gold);
}
header.top h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
header.top .sub { font-size: 12px; opacity: .9; margin-top: 4px; }
header.top .note {
  font-size: 11.5px; margin-top: 8px; padding: 7px 10px;
  background: rgba(199,155,60,.22); border-left: 3px solid var(--gold);
  border-radius: 3px; line-height: 1.6;
}

/* Day 导航 · sticky */
nav.days {
  position: sticky; top: 0; z-index: 100;
  background: rgba(246,241,234,.96); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
  padding: 8px 10px; overflow-x: auto; white-space: nowrap;
}
nav.days::-webkit-scrollbar { display: none; }
nav.days a {
  flex-shrink: 0; display: inline-block; min-width: 60px;
  padding: 6px 9px; margin-right: 4px; text-align: center;
  color: var(--muted); text-decoration: none;
  border: 1px solid var(--line); border-radius: 10px; background: #fff;
  font-size: 11.5px;
}
nav.days a.lock { background: var(--warn-bg); border-color: var(--warn-border); color: #5c4008; }
nav.days a.lock.done { background: var(--ok); border-color: var(--ok); color: #fff; }
nav.days a strong { display: block; font-size: 12.5px; font-weight: 700; }
nav.days a small { display: block; font-size: 10px; opacity: .8; margin-top: 1px; }

main { padding: 12px; }
section {
  margin-bottom: 20px; background: var(--card);
  border: 1px solid var(--line); border-radius: 10px;
  overflow: hidden; scroll-margin-top: 60px;
}
section > h2 {
  padding: 12px 14px; font-size: 15.5px; font-weight: 700;
  color: var(--hot-red); letter-spacing: .5px;
  border-bottom: 2px solid var(--hot-red);
  background: linear-gradient(135deg, #faece5, #fff);
}
section .body { padding: 12px 14px; }

/* 时间确认（强调式 · 不阻塞） */
#lock.done h2 { color: var(--ok); border-bottom-color: var(--ok); background: linear-gradient(135deg, #eaf3ea, #fff); }
.lock-item {
  padding: 10px 12px; background: #fff8e1; border: 1px solid var(--warn-border);
  border-radius: 6px; margin-bottom: 6px;
  display: grid; grid-template-columns: 24px 1fr 110px;
  gap: 8px; align-items: center;
}
.lock-item.checked {
  border-color: var(--ok); background: #f0f8f0;
}
.lock-item .title {
  font-size: 13px; font-weight: 600;
}
.lock-item .time-input {
  padding: 5px 7px; font: inherit; font-size: 12px;
  border: 1px solid var(--line); border-radius: 4px;
  text-align: center; background: #fff;
  font-family: ui-monospace, Menlo, monospace;
}
.lock-item input[type=checkbox] { margin: 0; cursor: pointer; width: 16px; height: 16px; }
.lock-item .extra-info {
  grid-column: 2 / 4; font-size: 11px; color: var(--muted);
  margin-top: 4px;
}
.lock-item .extra-info input {
  width: 100%; padding: 4px 6px; border: 1px solid var(--line);
  border-radius: 3px; font: inherit; font-size: 11px; background: #fff;
}
.lock-status {
  padding: 10px 14px; font-size: 12.5px; text-align: center;
  background: var(--warn-bg); border-top: 1px solid var(--warn-border);
  color: #5c4008; font-weight: 600;
}
.lock-status.done { background: #eaf3ea; border-top-color: var(--ok); color: var(--ok); }

/* §0 locks details 折叠 */
details#locks-section { }
details#locks-section > summary.locks-summary {
  padding: 12px 14px; font-size: 15.5px; font-weight: 700;
  color: var(--hot-red); letter-spacing: .5px;
  border-bottom: 2px solid var(--hot-red);
  background: linear-gradient(135deg, #faece5, #fff);
  cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;
}
details#locks-section > summary.locks-summary::-webkit-details-marker { display: none; }
details#locks-section > summary.locks-summary::before {
  content: '▶'; font-size: 11px; margin-right: 6px; transition: transform .2s;
}
details#locks-section[open] > summary.locks-summary::before { transform: rotate(90deg); }
#locks-status { font-size: 12px; color: var(--ok); font-weight: 400; }

/* Day section */
.day {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 10px; margin-bottom: 18px; overflow: hidden;
  scroll-margin-top: 60px;
}
/* 锁定为强调式 · 不阻塞编辑 */
.day.not-ready .day-header::before {
  content: '⚠️ 第 0 章还有未确认项'; display: block;
  background: var(--warn-bg); color: #5c4008;
  font-size: 10.5px; padding: 3px 10px; margin: -12px -14px 10px;
  font-family: -apple-system, sans-serif; letter-spacing: .3px;
}

.day-header {
  padding: 12px 14px; color: #fff8e0;
  background: linear-gradient(135deg, var(--hot-red), var(--hot-red-dark));
}
.day.day-river .day-header { background: linear-gradient(135deg, var(--ink-green), var(--ink-green-dark)); }
.day.day-leave .day-header { background: linear-gradient(135deg, var(--river-blue), #3d6a85); }
.day-header .num { font-size: 10.5px; opacity: .85; letter-spacing: 1.5px; }
.day-header .date { font-size: 15.5px; font-weight: 700; margin-top: 2px; letter-spacing: .5px; }
.day-header .theme { font-size: 12px; opacity: .95; margin-top: 3px; }
.day-header input {
  width: 100%; background: rgba(255,255,255,0.15); border: 1px dashed rgba(255,255,255,0.3);
  color: #fff8e0; padding: 4px 6px; border-radius: 3px;
  font: inherit; font-size: 14px; margin-top: 4px;
}
.day-meta-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--line);
  font-size: 11px; font-family: -apple-system, sans-serif;
}
.day-meta-bar > div {
  flex: 1; padding: 8px 6px; text-align: center; border-right: 1px solid var(--line);
}
.day-meta-bar > div:last-child { border-right: none; }
.day-meta-bar .lb { font-size: 10px; color: var(--muted); letter-spacing: .3px; }
.day-meta-bar .val { font-size: 12px; font-weight: 700; margin-top: 2px; }

.day-body { padding: 0; }
.sub-sec {
  padding: 10px 14px; border-bottom: 1px solid var(--line);
}
.sub-sec:last-child { border-bottom: none; }
.sub-sec h3 {
  font-size: 13.5px; color: var(--hot-red); font-weight: 700;
  margin-bottom: 7px; letter-spacing: .3px;
}

/* 今日待办 */
.todos-list { list-style: none; padding: 0; }
.todos-list li {
  padding: 6px 8px; background: #fff; border: 1px solid var(--line);
  border-radius: 4px; margin-bottom: 4px; font-size: 12.5px;
  display: flex; align-items: center; gap: 6px;
}
.todos-list li input[type=checkbox] { margin: 0; }

/* 时间轴 */
.tl-row {
  display: grid; grid-template-columns: 56px 1fr 28px;
  gap: 6px; padding: 6px 0; align-items: start;
}
.tl-row + .tl-row { border-top: 1px dashed var(--line); padding-top: 10px; }
.tl-row input[type=time] { padding: 5px; font-size: 11.5px; }
.tl-row input[type=text], .tl-row select {
  width: 100%; padding: 5px 6px; font-size: 12.5px;
  border: 1px solid var(--line); border-radius: 4px; font: inherit;
  background: #fff;
}
.tl-row .row-body { display: flex; flex-direction: column; gap: 4px; }
.tl-row .rm-btn {
  background: #f5e5e3; color: var(--hot-red); border: none;
  border-radius: 4px; font-size: 14px; cursor: pointer; padding: 0;
  font-family: -apple-system, sans-serif;
}

/* transit 可编辑 */
.transit-row {
  padding: 2px 0 4px 64px;
  font-family: -apple-system, sans-serif;
  display: flex; align-items: center; gap: 6px;
}
.transit-input {
  border: none; border-bottom: 1px dashed #bbb; background: transparent;
  flex: 1; font-size: 12px; color: #666; font-family: -apple-system, sans-serif;
  padding: 1px 2px; outline: none;
}
.transit-stale { color: #e74c3c; border-bottom-color: #e74c3c; }
.transit-warn  { font-size: 11px; color: #e74c3c; display: none; flex-shrink: 0; }

/* 关键时间节点 */
.tl-row.critical-active { border-left: 3px solid #e74c3c; background: #fff8f8; border-radius: 0 6px 6px 0; }
.critical-toggle { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 11.5px; color: var(--muted); cursor: pointer; }
.critical-toggle input[type="checkbox"] { accent-color: #e74c3c; }
.critical-toggle.active { color: #c0392b; font-weight: 600; }
.critical-reason-input { width: 100%; margin-top: 4px; padding: 4px 8px; border: 1px solid #e74c3c; border-radius: 4px; font-size: 12px; color: #c0392b; background: #fff8f8; }
.critical-reason-input::placeholder { color: #e8a0a0; }

.transit-hint {
  font-size: 10.5px; color: var(--muted); padding: 2px 0 4px 64px;
  font-family: -apple-system, sans-serif; letter-spacing: .2px;
}
.tl-add-btn {
  padding: 6px 10px;
  background: var(--bg); color: var(--hot-red);
  border: 1px dashed var(--line); border-radius: 5px;
  font: inherit; font-size: 12px; cursor: pointer;
}

/* 冲突提示 */
.conflicts { margin-top: 8px; }
.conflict {
  padding: 6px 10px; margin-bottom: 4px;
  background: var(--warn-bg); border-left: 3px solid var(--warn-border);
  font-size: 11.5px; color: #5c4008; border-radius: 3px;
}
.conflict.danger { background: #fde6e4; border-left-color: var(--danger); color: var(--danger); }

/* 餐饮 */
.meal-row {
  display: grid; grid-template-columns: 44px 1fr;
  gap: 6px; margin-bottom: 4px; align-items: center;
}
.meal-row label { font-size: 11.5px; color: var(--muted); padding-top: 4px; }
.meal-row input[type=text] {
  width: 100%; padding: 5px 7px; border: 1px solid var(--line);
  border-radius: 4px; font: inherit; font-size: 12.5px;
}

/* 便餐参考池 */
.meal-pool-section {
  margin-bottom: 20px; background: var(--card);
  border: 1px solid var(--line); border-radius: 10px;
  overflow: hidden;
}
.meal-pool-section h3 {
  padding: 10px 14px; font-size: 13.5px; color: var(--ink-green);
  font-weight: 700; border-bottom: 1px solid var(--line);
  background: linear-gradient(135deg, #eaf3ea, #fff);
}
.pool-region { padding: 8px 14px; border-bottom: 1px solid var(--line); }
.pool-region:last-child { border-bottom: none; }
.pool-region b { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
.pool-item {
  display: inline-block; margin: 2px 4px 2px 0;
  padding: 3px 8px; background: #fff; border: 1px solid var(--line);
  border-radius: 10px; font-size: 11.5px; color: var(--fg);
}

/* 备注 */
.notes-area {
  width: 100%; min-height: 48px; padding: 6px 8px;
  border: 1px solid var(--line); border-radius: 4px;
  font: inherit; font-size: 12px; resize: vertical;
}

/* 导出区 */
.export-box {
  padding: 14px; background: var(--card);
  border: 1px solid var(--line); border-radius: 10px;
}
.export-box h3 {
  font-size: 14px; color: var(--hot-red); margin-bottom: 8px;
}
.export-box .deliverables {
  display: grid; gap: 8px; margin-bottom: 12px;
}
.export-btn {
  padding: 10px 12px; background: #fff; border: 1px solid var(--hot-red);
  border-radius: 6px; color: var(--hot-red); cursor: pointer;
  font: inherit; font-size: 13px; text-align: left;
  display: flex; flex-direction: column; gap: 2px;
}
.export-btn:active { background: var(--hot-red); color: #fff; }
.export-btn small { font-size: 11px; color: var(--muted); }
.export-btn:active small { color: rgba(255,255,255,0.8); }
.btn-export-all {
  width: 100%; padding: 12px; margin-bottom: 10px;
  background: linear-gradient(135deg, var(--hot-red), var(--hot-red-dark));
  color: #fff8e0; border: none; border-radius: 8px;
  font: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: .5px;
}
.btn-export-all:active { opacity: .85; }
.export-box textarea {
  width: 100%; height: 280px; font: 11px/1.5 ui-monospace, Menlo, monospace;
  padding: 8px; border: 1px solid var(--line); border-radius: 4px;
}

/* Todo 三态 */
.todo-section-expired { opacity: .55; }
.todo-section-expired > summary,
.todo-section-expired > h4 { text-decoration: line-through; color: var(--muted) !important; }
.todo-section-active {
  border: 2px solid var(--warn-border); border-radius: 6px;
  padding: 8px; margin-bottom: 8px;
  background: var(--warn-bg);
}
.todo-section-active h4::after { content: ' 🔔 请尽快完成'; font-size: 10px; color: var(--warn-border); }
.todo-section-future { }
.todo-section-label {
  font-size: 12px; font-weight: 700; color: var(--hot-red);
  margin: 8px 0 4px; display: block;
}

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--ink-green); color: #fff; padding: 9px 18px;
  border-radius: 18px; font-size: 12.5px; opacity: 0;
  transition: opacity .3s; z-index: 200; pointer-events: none;
}
.toast.show { opacity: 1; }

footer { text-align: center; font-size: 10.5px; color: var(--muted); padding: 18px; }

/* v2.3 §4.11 天气 */
#weather-banner {
  padding: 10px 14px; margin: 8px 12px;
  background: #eaf4fb; border-left: 4px solid #2980b9;
  border-radius: 4px; font-size: 12.5px; line-height: 1.6;
  display: none;
}
#weather-banner b { color: #2471a3; }
.outdoor-hint {
  margin-top: 5px; padding: 5px 8px;
  background: #fef9e7; border-radius: 4px;
  font-size: 11.5px; color: #856404; line-height: 1.5;
}
.outdoor-hint b { color: #d35400; }

/* ─── v2.5 · Q2_MODE 三模式样式 ─────────────────────────── */

/* ── Full 模式（默认）：无额外样式 ── */

/* ── Constraint 模式：锁定项橙色标注 ── */
body.mode-constraint header.top {
  background: linear-gradient(135deg, #c47d2a, #9a5e1a);
}
.locked-banner {
  background: #fff3cd; border-left: 4px solid #e8a93c;
  padding: 8px 12px; font-size: 12px; line-height: 1.7;
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.locked-chip {
  background: #e8a93c; color: #fff;
  padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
body.mode-constraint .day.has-locked {
  border-left: 3px solid #e8a93c;
}
body.mode-constraint .collapsible-sec details > summary {
  cursor: pointer; list-style: none; padding: 4px 0;
  color: var(--muted); font-size: 12.5px;
}
body.mode-constraint .collapsible-sec details > summary::-webkit-details-marker { display: none; }

/* ── Express 模式：极简，高亮核心时间轴 ── */
body.mode-express header.top {
  background: linear-gradient(135deg, #2e7d9b, #1a4f64);
}
body.mode-express .day-meta-bar { display: none; }
body.mode-express section#lock details { display: none; } /* 隐藏 locks 展开区，仅显示摘要 */
body.mode-express .day-header input[name$="_theme"] { display: none; } /* 主题只读，不可改 */
body.mode-express .sub-sec h3 { font-size: 13px; }
body.mode-express .tl-add-btn {
  /* express 模式下新增按钮缩小，减少干扰 */
  font-size: 11px !important; padding: 4px 6px !important;
}
</style>
</head>
<body>

<header class="top">
  <h1 id="hdr-title">Q2 v2.3 · 锁定行程</h1>
  <div class="sub" id="hdr-sub"></div>
  <div class="note">📌 <b>Q2 定位</b>：锁定行程。第 0 章确认时间 + 酒店 + 已订项目（强调提示、不阻塞编辑）。填完导出 3 份文件 → Claude 合并生成 <b>trip.html 攻略</b> + <b>出行前清单</b>。</div>
</header>

<!-- v2.3 §4.11 出发前 7 天天气提醒 -->
<div id="weather-banner"></div>

<nav class="days" id="day-nav">
  <a href="#lock" id="nav-lock" class="lock">⏰<br><small>时间</small></a>
</nav>

<main id="main">

<section id="lock">
  <details id="locks-section" open>
    <summary class="locks-summary">0 · ⏰ 时间与住宿确认（以时间为主，订单号可选填）<span id="locks-status"></span></summary>
    <div id="locks-content">
      <div class="body" id="lock-list"></div>
      <div class="lock-status" id="lock-status">⚠️ 还有未确认项（继续编辑，但强调提醒你回来填完）</div>
    </div>
  </details>
</section>

<div id="meal-pool-wrap"></div>

<div id="days-wrap"></div>

<section id="export">
  <h2>4 · 📤 导出（3 份产物）</h2>
  <div class="body">
    <div class="deliverables">
      <button class="btn-export-all" onclick="exportAll()">📦 一键导出全部</button>
      <button class="export-btn" onclick="exportArrangementMd()">
        📄 <b id="btn-label-md">arrangement.md</b>
        <small>人类可读的行程表，贴回对话给 Claude</small>
      </button>
      <button class="export-btn" onclick="exportTripJson()">
        🔧 <b id="btn-label-json">trip.json</b>
        <small>结构化数据，Claude 用来合并进 trip.json</small>
      </button>
      <button class="export-btn" onclick="exportTodoMd()">
        📅 <b id="btn-label-todo">todo.md</b>
        <small>出行前清单（已订完 / 行前几天 / 出发当天 / 出行中实时）</small>
      </button>
    </div>
    <textarea id="export-output" placeholder="点上方按钮生成..."></textarea>
  </div>
</section>

</main>

<div class="toast" id="toast"></div>
<footer id="page-footer">Q2 v2.3 · 草稿本地保存</footer>

<script>
/* ============ Q2_MODE · 三种渲染模式 ============
 *  'full'       — 从零开始 (Full Flow A)：完整候选池 + 美食池 + 备用方案 + 出行清单
 *  'constraint' — 有部分计划 (Constraint Flow B)：锁定项高亮置顶 + 开放项标注 · 隐藏通用候选池
 *  'express'    — 行程已定 (Express Flow C)：仅时间轴 + 导出 · 隐藏候选池/美食池/备用方案
 * ================================================================ */
const Q2_MODE = '{{Q2_MODE}}';   // 由构建脚本替换；默认 'full'

/* ============ _PROFILE 常量 ============ */
const _PROFILE = {
  destination: '{{DESTINATION}}',
  trip_id:     '{{TRIP_ID}}',
  days:         0,
  people:       0,
  start_date:  '{{START_DATE}}',
  archetype:   '{{ARCHETYPE}}',     // short / medium-single / medium-multi / long
  country_code:'{{COUNTRY_CODE}}',
};

/* ============ 数据 ============ */

// ⏰ 时间与住宿确认（以时间为主 · 强调不阻塞）
const LOCKS = [

  //   default: '默认值（如 07:45）', placeholder: '补充信息',
  //   extra: '附加说明', requires_time: true,
  //   time_range: '06:00-09:00'  // 区间型时间用此字段
  // },
  // 由 Phase 1 report 按目的地填充
];

// 出行前 todo（来自 phase-1-report.md）
const TODO_SECTIONS = [
  // { label: '阶段标题（如"已订完"）', items: ['具体待办项1', '待办项2'] },
  // 由 Phase 1 report 按 archetype + 目的地填充
  // short 4段 / medium 5段 / long 30/14/7/3/1 五段
];

// 每日时间轴（来自 phase-1-report.md 精确预填）
const DAYS = [
  // {
  //   num: 1,  // ⚠️ 第几天（1 起）。可省略：renderDays() 会按数组顺序自动补。

/* ============ 工具函数 ============ */
// 把 DAYS 里粗的 type='meal' 按 time 细化成 meal_breakfast / lunch / dinner / snack
function refineType(rawType, timeStr) {
  if (rawType !== 'meal') return rawType || 'free';
  if (!timeStr) return 'meal_lunch';
  const h = parseInt(String(timeStr).split(':')[0]);
  if (isNaN(h)) return 'meal_lunch';
  if (h < 11) return 'meal_breakfast';
  if (h < 14) return 'meal_lunch';
  if (h < 17) return 'meal_snack';
  return 'meal_dinner';
}

// 同类型替换池：按 type + city 过滤（兼容旧逻辑）
function filterByType(city, type) {
  return SPOT_OPTIONS.filter(o =>
    (o.city === 'all' || o.city === city) && o.type === type
  );
}

// v2.2 #18 双维过滤 type+intent
function inferIntent(type, position, dayContext) {
  if (type === 'hotel') {
    const list = dayContext.hotelRows || [];
    if (list.length === 0) return 'rest';
    if (dayContext.currentIdx === list[0]) return 'checkin';
    if (dayContext.currentIdx === list[list.length - 1]) return 'checkout';
    return 'rest';
  }
  if (type && type.startsWith('meal_')) {
    const firstSeen = dayContext.mealTypeFirstSeen || {};
    return firstSeen[type] === dayContext.currentIdx ? 'signature' : 'fallback';
  }
  if (type === 'sight') {
    return dayContext.altPool ? 'alt' : 'flagship';
  }
  if (type === 'experience') {
    return dayContext.hasBookingDate ? 'booked' : 'walkin';
  }
  if (type === 'transit') return 'intercity';
  return null;
}

const INTENT_LABEL = {
  checkin: '签到', checkout: '退房', rest: '休整', luggage: '寄存',
  signature: '首选', fallback: '备用', local_market: '市场组合',
  flagship: '必去', alt: '备选',
  booked: '已订', walkin: '现到',
  intercity: '跨城', local: '市内'
};

// v2.2 #18 双维过滤 type+intent
function filterByTypeIntent(city, type, intent) {
  const sameType = SPOT_OPTIONS.filter(o => o.type === type);
  const sameIntent = intent ? sameType.filter(o => !o.intent || o.intent === intent) : sameType;
  return sameIntent.filter(o => o.city === city || o.city === 'all');
}

/* ============ v2.3 region 四维过滤 ============ */
function getSpotCandidates(type, intent, region) {
  const baseFilter = SPOT_OPTIONS.filter(s =>
    s.type === type &&
    (!intent || !s.intent || s.intent === intent) &&
    (s.region === region || s.region === 'all' || !s.region)
  );

  // 跨片区选项（始终追加在末尾，用分隔线隔开）
  const crossRegion = SPOT_OPTIONS.filter(s =>
    s.type === type &&
    (!intent || !s.intent || s.intent === intent) &&
    s.region && s.region !== region && s.region !== 'all'
  );

  return { local: baseFilter, cross: crossRegion };
}

function renderSpotSelectHtml(type, intent, region, currentValue) {
  const { local, cross } = getSpotCandidates(type, intent, region);

  const matched = findMatchedOptionFromList(currentValue, [...local, ...cross]);
  const isCustom = currentValue && !matched;

  let options = `<option value="">-- 选 ${TYPE_LABEL[type] || type} --</option>`;
  options += local.map(s => {
    const sel = (matched && (s.n === currentValue || s.card_id === currentValue)) ? ' selected' : '';
    return `<option value="${s.card_id || s.n}"${sel}>${s.n}</option>`;
  }).join('');

  if (cross.length > 0) {
    options += `<option disabled>── 跨片区选项 ──</option>`;
    options += cross.map(s => {
      const sel = (matched && (s.n === currentValue || s.card_id === currentValue)) ? ' selected' : '';
      return `<option value="${s.card_id || s.n}"${sel}>[${s.region}] ${s.n}</option>`;
    }).join('');
  }
  options += `<option value="__custom"${isCustom ? ' selected' : ''}>▶ 自由填写（不在候选里）</option>`;

  return { html: options, isCustom };
}

function findMatchedOptionFromList(spot, candidates) {
  if (!spot) return null;
  const stripEmoji = s => String(s).replace(/^[^一-龥a-zA-Z]+/, '').trim().toLowerCase();
  const spotBare = stripEmoji(spot);
  if (!spotBare) return null;
  for (const opt of candidates) {
    const optBare = stripEmoji(opt.n);
    if (!optBare) continue;
    if (optBare === spotBare || optBare.includes(spotBare) || spotBare.includes(optBare)) return opt.n;
    if (opt.card_id && opt.card_id === spot) return opt.n;
  }
  return null;
}

function findMatchedOption(spot, candidates) {
  return findMatchedOptionFromList(spot, candidates);
}

// v2.2 兼容：保留旧 buildTypeSelectOptions（基于 city+type+intent）
function buildTypeSelectOptions(city, type, currentSpot, intent) {
  const candidates = intent ? filterByTypeIntent(city, type, intent) : filterByType(city, type);
  const matched = findMatchedOption(currentSpot, candidates);
  const isCustom = currentSpot && !matched;

  let html = `<option value="">-- 选 ${TYPE_LABEL[type] || type} --</option>`;
  candidates.forEach(item => {
    const sel = matched && item.n === matched ? ' selected' : '';
    html += `<option value="${item.n}"${sel}>${item.n}</option>`;
  });
  html += `<option value="__custom"${isCustom ? ' selected' : ''}>▶ 自由填写（不在候选里）</option>`;
  return { html, isCustom };
}

function renderLocks() {
  const ct = document.getElementById('lock-list');
  ct.innerHTML = LOCKS.map(l => {
    const input = l.kind === 'time'
      ? `<input type="time" class="time-input" name="${l.id}_val" value="${l.default || ''}">`
      : `<input type="text" class="time-input" name="${l.id}_val" placeholder="${l.placeholder || '填入内容'}" style="font-family:inherit;text-align:left;">`;
    const extra = l.extra ? `<div class="extra-info"><input type="text" name="${l.id}_extra" placeholder="${l.extra}"></div>` : '';
    return `
      <div class="lock-item" data-lock="${l.id}">
        <input type="checkbox" class="lock-check" name="${l.id}_done" onchange="onLockChange()">
        <div class="title">${l.title}</div>
        ${input}
        ${extra}
      </div>
    `;
  }).join('');
}

function onLockChange() {
  const total = LOCKS.length;
  const done = LOCKS.filter(l => {
    const el = document.querySelector(`[name="${l.id}_done"]`);
    return el && el.checked;
  }).length;
  const allDone = total > 0 && done === total;
  const status = document.getElementById('lock-status');
  const sect = document.getElementById('lock');
  const nav = document.getElementById('nav-lock');

  LOCKS.forEach(l => {
    const item = document.querySelector(`[data-lock="${l.id}"]`);
    const chk = document.querySelector(`[name="${l.id}_done"]`);
    if (item && chk) item.classList.toggle('checked', chk.checked);
  });

  if (allDone) {
    status.textContent = '✓ 全部确认完成 · 可放心导出';
    status.classList.add('done');
    sect.classList.add('done');
    nav.classList.add('done');
    document.querySelectorAll('.day').forEach(d => d.classList.remove('not-ready'));
  } else {
    status.textContent = total > 0
      ? `⚠️ 还有 ${total - done} 项未确认（可继续编辑 · 但记得回来补）`
      : '（暂无锁定项）';
    status.classList.remove('done');
    sect.classList.remove('done');
    nav.classList.remove('done');
    document.querySelectorAll('.day').forEach(d => d.classList.add('not-ready'));
  }

  checkAllLocked();
  saveDraft();
}

function renderTimeline(d) {
  const ct = document.getElementById(`tl-d${d.num}`);
  ct.innerHTML = '';
  // v2.2 #18 预扫一遍 timeline · 算 dayContext（hotel 行位置 + meal 类型首次出现位置）
  const hotelRows = [];
  const mealTypeFirstSeen = {};
  d.timeline.forEach((r, i) => {
    const t = refineType(r.type, r.time);
    if (t === 'hotel') hotelRows.push(i);
    if (t.startsWith('meal_') && mealTypeFirstSeen[t] === undefined) mealTypeFirstSeen[t] = i;
  });
  d.timeline.forEach((r, i) => {
    const refined = refineType(r.type, r.time);
    const intent = r.intent || inferIntent(refined, i, { hotelRows, mealTypeFirstSeen, currentIdx: i, totalRows: d.timeline.length, hasBookingDate: !!r.booking_date });
    const dayRegion = r.region || d.region || 'all';
    const itemId = `d${d.num}_t${i}`;
    ct.appendChild(tlRow(d.num, i, r, _CITY_SLUG, intent, dayRegion));

    // v2.3: transit_to_next 改为可编辑 input
    if (i < d.timeline.length - 1) {
      const transitDiv = document.createElement('div');
      transitDiv.className = 'transit-row';
      transitDiv.innerHTML = `<input class="transit-input"
        data-item-id="${itemId}"
        data-stale="false"
        value="${r.transit_to_next || ''}"
        placeholder="填交通方式和时长（如：步行8min / 打车15min）" />
      <span class="transit-warn">⚠️ 已过期，请重填</span>`;
      ct.appendChild(transitDiv);
    }
  });
}

// v2.3: tlRow 增加 region 参数，spot 下拉使用四维过滤
function tlRow(dayNum, idx, r, city, intent, region) {
  const wrap = document.createElement('div');

  const finalIntent = intent || r.intent || null;

  // v2.3 四维过滤（type + intent + region）
  const built = renderSpotSelectHtml(refinedType, finalIntent, itemRegion, r.spot);

  const typeLabel = TYPE_LABEL[refinedType] || refinedType;
  const intentLabel = finalIntent && INTENT_LABEL[finalIntent] ? INTENT_LABEL[finalIntent] : '';
  const intentBadgeHtml = intentLabel ? `<span class="intent-badge" style="font-size:10px;color:var(--ink-green);background:#eaf3ea;padding:2px 6px;border-radius:8px;margin-left:4px;flex-shrink:0;font-family:-apple-system,sans-serif;">${intentLabel}</span>` : '';

    <input type="time" name="${itemId}_time" value="${r.time || ''}" onchange="onTimeChange(this, '${city}', '${itemRegion}')">

      <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px;">
        <span class="type-badge" data-type="${refinedType}" style="font-size:11px;color:var(--hot-red);background:#fff1ec;padding:3px 8px;border-radius:10px;flex-shrink:0;font-family:-apple-system,sans-serif;letter-spacing:.3px;">${typeLabel}</span>
        ${intentBadgeHtml}
        <select name="${itemId}_spot" data-item-id="${itemId}" onchange="onSpotChange(this)" style="flex:1;">${built.html}</select>
      </div>
      <input type="hidden" name="${itemId}_type" value="${refinedType}">
      <input type="hidden" name="${itemId}_intent" value="${finalIntent || ''}">
      <input type="hidden" name="${itemId}_region" value="${itemRegion}">
      <input type="text" name="${itemId}_spot_custom" value="${built.isCustom ? (r.spot || '') : ''}" placeholder="自由填写..." style="display:${built.isCustom ? 'block' : 'none'};margin-top:4px;">
      <input type="text" name="${itemId}_note" value="${r.note || ''}" placeholder="备注（提醒/时长）" style="margin-top:4px;">
      ${r.hours ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;">🕐 营业 ${r.hours}</div>` : ''}
      <label class="critical-toggle ${r.is_critical ? 'active' : ''}" onclick="toggleCritical(this)">
        <input type="checkbox" name="${itemId}_critical" ${r.is_critical ? 'checked' : ''}>

        value="${r.critical_reason || ''}"
        placeholder="说明原因，如：末班巴士 13:35，错过无替代交通"
        style="display:${r.is_critical ? 'block' : 'none'};">
    </div>
    <button class="rm-btn" onclick="this.parentElement.remove(); saveDraft();">×</button>

  return wrap;
}

// 时间变化：只在 meal 类型下重建下拉（早餐时间→晚餐时间会切换 meal_xxx 子类）
function onTimeChange(timeInput, city, region) {
  const row = timeInput.parentElement;
  const typeHidden = row.querySelector('input[name$="_type"]');
  const badge = row.querySelector('.type-badge');
  const spotSel = row.querySelector('select[name$="_spot"]');
  const customInput = row.querySelector('input[name$="_spot_custom"]');
  if (!typeHidden.value.startsWith('meal_')) { saveDraft(); return; }
  const newType = refineType('meal', timeInput.value);
  if (newType !== typeHidden.value) {
    typeHidden.value = newType;
    badge.textContent = TYPE_LABEL[newType];
    badge.dataset.type = newType;
    const currentSpot = spotSel.value === '__custom' ? customInput.value : spotSel.value;
    const intentHidden = row.querySelector('input[name$="_intent"]');
    const intent = intentHidden ? intentHidden.value : null;
    const itemRegion = region || 'all';
    const built = renderSpotSelectHtml(newType, intent, itemRegion, currentSpot);
    spotSel.innerHTML = built.html;
    customInput.style.display = built.isCustom ? 'block' : 'none';
  }
  saveDraft();
}

function onSpotChange(sel) {
  const customInput = sel.parentElement.querySelector('input[name$="_spot_custom"]');
  if (sel.value === '__custom') {
    customInput.style.display = 'block';
    customInput.focus();
  } else {
    customInput.style.display = 'none';
    customInput.value = '';
  }
  // v2.3: 标记同一行后面的 transit 为过期
  const itemId = sel.dataset.itemId;
  if (itemId) markTransitStale(itemId);
  saveDraft();
}

function addTlRow(dayNum, type) {

/* ============ 冲突检测 ============ */
function checkConflicts(dayNum) {
  const ct = document.getElementById(`conflicts-d${dayNum}`);
  const issues = [];
  const day = DAYS.find(d => d.num === dayNum);
  if (!day) return;

  // 检 1：时间是否严格递增
  let prev = null;
  day.timeline.forEach((r, i) => {
    const timeInput = document.querySelector(`[name="d${dayNum}_t${i}_time"]`);
    if (!timeInput) return;
    const t = timeInput.value;
    if (prev && t < prev) {
      issues.push({ level: 'danger', text: `⚠️ 第 ${i+1} 行 ${t} 早于上一行 ${prev} · 顺序错乱` });
    }
    prev = t;
  });

  // 检 2：营业时间
  day.timeline.forEach((r, i) => {
    if (!r.hours) return;
    const timeInput = document.querySelector(`[name="d${dayNum}_t${i}_time"]`);
    if (!timeInput) return;
    const t = timeInput.value;
    const m = r.hours.match(/(\d+:\d+)[-～](\d+:\d+)/);
    if (m && (t < m[1] || t > m[2])) {
      issues.push({ level: 'warn', text: `⚠️ ${r.spot} 排了 ${t}，但营业时间 ${r.hours}` });
    }
  });

  // 检 3：高铁日提醒
  if ([1, 3].includes(dayNum)) {
    issues.push({ level: 'warn', text: '🚄 高铁日 · 建议提前 30min 到火车站取票/进站' });
  }

  if (issues.length === 0) {
    ct.innerHTML = '<div class="conflict" style="background:#eaf3ea;border-left-color:var(--ok);color:var(--ok);">✓ 无冲突</div>';
  } else {
    ct.innerHTML = issues.map(i => `<div class="conflict ${i.level === 'danger' ? 'danger' : ''}">${i.text}</div>`).join('');
  }
}

/* ============ LocalStorage ============ */
const STORAGE_KEY = 'q2_v23_' + (_PROFILE.trip_id !== '{{TRIP_ID}}' ? _PROFILE.trip_id : 'draft');
let saveTimer;

function saveDraft() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const data = {};
    document.querySelectorAll('input, select, textarea').forEach(el => {
      if (!el.name) return;
      if (el.type === 'checkbox') {
        data[el.name] = el.checked;
      } else if (el.type === 'radio') {
        if (el.checked) data[el.name] = el.value;
      } else {
        if (el.value) data[el.name] = el.value;
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }, 300);
}

function loadDraft() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    Object.entries(data).forEach(([k, v]) => {
      const el = document.querySelector(`[name="${k}"]`);
      if (!el) return;
      if (el.type === 'checkbox') el.checked = !!v;
      else if (el.type === 'radio') {
        document.querySelectorAll(`[name="${k}"]`).forEach(e => { if (e.value === v) e.checked = true; });
      } else {
        el.value = v;
      }
    });
    onLockChange();
  } catch (e) {}
}

/* ============ 工具 · val ============ */
function val(name) {
  const el = document.querySelector(`[name="${name}"]`);
  if (!el) return '';
  if (el.type === 'checkbox') return el.checked ? 'done' : '';
  return el.value || '';
}

/* ============ v2.3 todo 过期段三态 ============ */
function getTodoSectionState(sectionIndex) {
  const start = new Date(_PROFILE.start_date !== '{{START_DATE}}' ? _PROFILE.start_date : '2099-01-01');
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const thresholds = {
    'short':         [null, null, start - 2*86400000, start - 86400000, null],
    'medium-single': [start - 30*86400000, start - 14*86400000, start - 7*86400000, start - 86400000, null],
    'medium-multi':  [start - 30*86400000, start - 14*86400000, start - 7*86400000, start - 86400000, null],
    'long':          [start - 30*86400000, start - 14*86400000, start - 7*86400000, start - 3*86400000, start - 86400000],
  }[_PROFILE.archetype] || [];

  const cutoff = thresholds[sectionIndex];
  if (cutoff == null) return 'future';

  const cutoffDate = new Date(cutoff);
  const activeFrom = new Date(cutoff - 7 * 86400000);

  if (today > cutoffDate) return 'expired';
  if (today >= activeFrom) return 'active';
  return 'future';
}

        if (isCritical && criticalReason) L.push(`  ⚠️ _原因：${criticalReason}_`);
        if (transitVal && i < rows.length - 1) {

    document.querySelectorAll(`#tl-d${d.num} .tl-row`).forEach((row, i) => {

      if (!tHidden.startsWith('meal_')) return;
      const spotSel = row.querySelector(`[name="d${d.num}_t${i}_spot"]`)?.value || '';

        transit_to_next: transitStale ? '' : transitVal
      };
      if (isCriticalJson) { tlItem.is_critical = true; tlItem.critical_reason = criticalReasonJson; }
      tl.push(tlItem);
    });
    payload.days.push({
      num: d.num, date: d.date, weekday: d.weekday,
      theme: val('d'+d.num+'_theme') || d.theme,
      main_region: d.main_region,
      region: d.region || '',
      timeline: tl,
      meals: { breakfast: val('d'+d.num+'_breakfast'), lunch: val('d'+d.num+'_lunch'), dinner: val('d'+d.num+'_dinner') },
      backup: { rain: val('d'+d.num+'_backup_rain'), other: val('d'+d.num+'_backup_other') },
      notes: val('d'+d.num+'_notes')
    });
  });
  return JSON.stringify(payload, null, 2);
}

/* ============ v2.3 一键导出全部 ============ */
function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportAll() {
  const staleCount = document.querySelectorAll('.transit-input[data-stale="true"]').length;
  if (staleCount > 0) {
    if (!confirm(`⚠️ 有 ${staleCount} 处交通信息已过期，是否继续导出？`)) return;
  }

  const tripId = _PROFILE.trip_id !== '{{TRIP_ID}}' ? _PROFILE.trip_id : 'trip';
  downloadFile(`${tripId}_arrangement.md`, generateArrangementMd());
  setTimeout(() => downloadFile(`${tripId}_todo.md`, generateTodoMd()), 300);
  setTimeout(() => downloadFile(`${tripId}_trip.json`, generateTripJson()), 600);
  toast('📦 3 份文件正在下载...');
}

function copy(text) { if (navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{}); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============ v2.3 §4.11 天气感知 ============ */

// 计算距出发天数（负值=已出发）
function daysUntilDeparture() {
  const startStr = _PROFILE.start_date;
  if (!startStr || startStr === '{{START_DATE}}') return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const dep = new Date(startStr); dep.setHours(0,0,0,0);
  return Math.round((dep - today) / 86400000);
}

// 出发前 7 天：显示提醒横幅
function checkDepartureWindow() {
  const diff = daysUntilDeparture();
  if (diff === null) return;
  const banner = document.getElementById('weather-banner');
  if (!banner) return;
  if (diff >= 0 && diff <= 7) {
    banner.style.display = 'block';
    const when = diff === 0 ? '今天出发' : `还有 ${diff} 天出发`;
    banner.innerHTML = `🌦 <b>天气预报有效期内（${when}）</b><br>
      现在是可以参考实时天气的最佳时机。<br>
      · 请查看目的地未来 ${Math.min(diff + _PROFILE.days, 7)} 天天气，<b>重点检查以下有室外活动的天次</b>并更新"下雨备案"。<br>
      · 导出 trip.json 后，在 trip.html 中会自动显示天气预报（需填入 weather_api_key）。`;
  } else if (diff < 0) {
    // 旅途中
    banner.style.display = 'block';
    banner.style.borderLeftColor = '#27ae60';
    banner.style.background = '#eafaf1';
    banner.innerHTML = `✈️ <b>旅途进行中（已出发 ${Math.abs(diff)} 天）</b><br>如需临时调整行程，在各天"备用方案"中直接更新，然后重新导出 arrangement.md。`;
  }
}

// 生成当天室外景点提示（用于备用方案区域）
function getOutdoorSpotHint(d) {
  const outdoorSpots = (d.timeline || []).filter(r => r.outdoor === true);
  if (outdoorSpots.length === 0) return '';
  const diff = daysUntilDeparture();
  const inWindow = diff !== null && diff >= 0 && diff <= 7;
  const spots = outdoorSpots.map(r => r.spot || r.note || '室外活动').join(' / ');
  return `<div class="outdoor-hint">
    🌧 <b>当天室外景点：</b>${spots}<br>
    ${inWindow ? '📡 出发前 7 天内，建议根据实时天气检查并补充雨天备案。' : '建议提前想好这些景点的室内替代选项。'}
  </div>`;
}
