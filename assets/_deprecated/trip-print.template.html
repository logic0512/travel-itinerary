<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>旅行攻略</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C0392B;--gold:#C9A84C;--warm:#E8A020;
  --ink:#1A1A1A;--ink2:#555;--ink3:#999;--ink4:#BBB;
  --bg:#FAFAF8;--bg2:#F5F3EF;--bg3:#EEECEA;--border:#E4E0DA;
  --serif:'Noto Serif SC',serif;--sans:'Noto Sans SC',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:var(--sans);color:var(--ink)}
body{display:flex;flex-direction:column}
#stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
#pages-wrap{position:relative;width:1920px;height:1080px;flex-shrink:0;transform-origin:center center}
.page{position:absolute;top:0;left:0;width:1920px;height:1080px;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.page.active{display:flex}
img{display:block;object-fit:cover}
.scroll-y{overflow-y:auto;scrollbar-width:thin;scrollbar-color:#D0CCC6 transparent}
.scroll-y::-webkit-scrollbar{width:4px}
.scroll-y::-webkit-scrollbar-thumb{background:#D0CCC6;border-radius:2px}

/* ── NAV ── */
#nav-bar{flex-shrink:0;height:48px;background:#1A1A1A;display:flex;align-items:center;justify-content:center;gap:20px;z-index:9999}
#nav-bar button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px 12px;opacity:.7;transition:opacity .15s}
#nav-bar button:hover{opacity:1}
#page-dots{display:flex;gap:6px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#555;cursor:pointer;transition:all .2s}
.dot.active{background:#fff;transform:scale(1.4)}
#page-label{color:#666;font:400 11px var(--mono);min-width:100px;text-align:center}

/* ── SHARED ── */
.day-header{height:56px;background:var(--ink);display:flex;align-items:center;padding:0 40px;gap:16px;flex-shrink:0;overflow:hidden}
.day-header .d-num{font:500 10px var(--mono);letter-spacing:.25em;color:#aaa;text-transform:uppercase;flex-shrink:0}
.day-header h2{font:700 22px var(--serif);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}
.day-header .d-date{font:400 13px var(--sans);color:#888;margin-left:8px;flex-shrink:0}
.day-header .d-chips{margin-left:auto;display:flex;gap:8px;overflow:hidden;max-width:42%;flex-shrink:0}
.d-chip{background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;font:400 11px var(--sans);color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}

.map-link{color:inherit;text-decoration:underline dotted var(--ink3);cursor:pointer}
.must-badge{position:absolute;top:10px;right:10px;background:var(--gold);color:#fff;font:700 11px var(--mono);padding:3px 10px;border-radius:3px;z-index:2}
.tr-bar{height:28px;background:#F3F4F6;display:flex;align-items:center;padding:0 88px;gap:12px;font:400 11px var(--sans);color:#888;flex-shrink:0;min-width:0;max-width:100%;overflow:hidden;box-sizing:border-box;width:100%}
.tr-mode{font-weight:500;color:var(--ink2);flex-shrink:0}
.tr-km{color:var(--ink3);flex-shrink:0}
.tr-note{font-size:10px;color:#bbb;flex-shrink:0;margin-left:8px}
.map-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:#999;font:400 12px var(--sans);text-align:center;background:#F0EDE8;line-height:1.6}
.type-pill{display:inline-block;background:var(--bg3);border-radius:3px;padding:2px 8px;font:400 10px var(--sans);color:var(--ink3);margin-right:4px}

/* ── COVER ── */
.cv-left{width:38%;padding:60px 52px;display:flex;flex-direction:column;justify-content:center;background:var(--bg)}
.cv-label{font:500 10px var(--mono);letter-spacing:.25em;color:var(--ink3);margin-bottom:32px;text-transform:uppercase}
.cv-title{font:700 64px/1.1 var(--serif);color:var(--ink);margin:0 0 16px}
.cv-sub{font:400 20px/1.5 var(--sans);color:var(--ink2);margin-bottom:40px}
.cv-route{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cv-route .rt{background:var(--ink);color:#fff;padding:6px 14px;border-radius:4px;font:500 13px var(--sans)}
.cv-route .rs{color:var(--ink3);font-size:13px}
.cv-footer{margin-top:auto;font:400 11px var(--sans);color:var(--ink4)}
.cv-right{flex:1;position:relative;overflow:hidden}
.cv-right img{width:100%;height:100%}
.cv-right::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(250,250,248,.25) 0%,transparent 40%)}

/* ── OVERVIEW ── */
.ov-header{height:72px;background:var(--ink);display:flex;align-items:center;padding:0 56px;gap:32px;flex-shrink:0}
.ov-header h2{font:700 24px var(--serif);color:#fff}
.ov-header span{font:400 13px var(--sans);color:#aaa}
.ov-body{flex:1;display:flex;overflow:hidden}
.ov-map-area{flex:1;min-width:0;overflow:hidden}
.ov-sidebar{width:380px;min-width:0;flex-shrink:0;background:var(--bg2);padding:28px 24px;overflow:hidden;display:flex;flex-direction:column;gap:16px}
.ov-day-card{background:#fff;border-radius:8px;border:1px solid var(--border);padding:14px 16px}
.ov-day-card .oc-num{font:500 10px var(--mono);letter-spacing:.2em;color:var(--ink3);text-transform:uppercase;margin-bottom:4px}
.ov-day-card .oc-theme{font:700 15px var(--sans);color:var(--ink);margin-bottom:6px}
.ov-day-card .oc-places{font:400 12px var(--sans);color:var(--ink2);line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.dt-badge{display:inline-block;padding:2px 8px;border-radius:3px;font:500 10px var(--mono);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.dt-standard{background:#EBF3FF;color:#1D5FA6}
.dt-food{background:#FFF3E0;color:#BF5800}
.dt-outdoor{background:#E8F5E9;color:#2E7D32}
.dt-geographic{background:#F3E5F5;color:#7B1FA2}
.dt-cultural{background:#FBE9E7;color:#BF360C}

/* ── STANDARD ── */
.std-body{flex:1;display:flex;overflow:hidden;min-width:0}
.std-left{width:22%;min-width:0;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0}
.std-map-area{flex:1;min-height:0;overflow:hidden}
.std-reminders{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;overflow:hidden}
.std-reminders h5{font:500 10px var(--mono);letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-bottom:8px}
.std-rem-item{display:flex;gap:8px;margin-bottom:5px;font:400 11px var(--sans);color:var(--ink2);line-height:1.5;overflow:hidden}
.std-rem-item::before{content:'!';flex-shrink:0;width:15px;height:15px;background:var(--accent);color:#fff;border-radius:50%;font:700 9px var(--sans);display:flex;align-items:center;justify-content:center;margin-top:1px}
.std-right{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.std-tl{flex:1;min-width:0;padding:24px 40px 12px;overflow:hidden;position:relative}
.tl-axis{position:absolute;left:76px;top:28px;bottom:4px;width:2px;background:var(--accent);opacity:.4}
.tl-node{position:relative;display:flex;gap:0;margin-bottom:8px;overflow:hidden;flex-shrink:0}
.tl-dot{position:absolute;left:71px;top:28px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);z-index:2;flex-shrink:0}
/* 时间是标准行程的视觉主角 — 大字 */
.tl-time-big{position:absolute;left:0;top:16px;width:64px;font:700 42px/1 var(--mono);color:var(--accent);text-align:right;letter-spacing:-.02em;flex-shrink:0}
.tl-content{flex:1;min-width:0;display:flex;padding-left:96px;gap:14px;padding-bottom:8px;overflow:hidden;max-width:100%;box-sizing:border-box}
.tl-meta{flex:1;min-width:0;overflow:hidden}
.tl-name{font:700 16px var(--sans);color:var(--ink);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-intro{font:400 12px var(--sans);color:var(--ink2);line-height:1.6;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.tl-info{display:flex;gap:10px;margin-top:5px;font:400 11px var(--sans);color:var(--ink3);flex-wrap:wrap}
.tl-img-wrap{width:126px;height:84px;border-radius:6px;overflow:hidden;flex-shrink:0;margin-top:4px}
.tl-img-wrap img{width:126px;height:84px}
.tl-node.must-node{border-left:4px solid var(--gold);margin-left:-4px;padding-left:4px;border-radius:2px;background:rgba(201,168,76,.04)}
.std-meals{height:94px;border-top:1px solid var(--border);padding:10px 40px;display:flex;gap:14px;align-items:center;background:#fff;flex-shrink:0}
.std-meals-label{font:500 11px var(--mono);letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;writing-mode:vertical-rl;flex-shrink:0}
.meal-card{display:flex;gap:10px;align-items:center;flex:1;background:var(--bg2);border-radius:6px;padding:8px 12px;height:72px;min-width:0}
.meal-img{width:48px;height:48px;border-radius:4px;overflow:hidden;flex-shrink:0}
.meal-img img{width:100%;height:100%}
.meal-name{font:700 12px var(--sans);color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-type{font:400 10px var(--sans);color:var(--ink3);margin-bottom:1px}
.meal-price{font:500 11px var(--mono);color:var(--accent)}

/* ── GEOGRAPHIC ── */
.geo-body{flex:1;display:flex;overflow:hidden}
.geo-map-half{width:48%;position:relative;display:flex;flex-direction:column}
.geo-map-inner{flex:1;min-height:0}
.geo-map-footer{height:44px;background:rgba(0,0,0,.7);display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0}
.geo-map-footer span{font:500 12px var(--mono);color:#fff}
.geo-right{flex:1;min-width:0;padding:20px 32px;overflow:hidden;display:flex;flex-direction:column;gap:14px;box-sizing:border-box}
.geo-right::-webkit-scrollbar{width:4px}
.geo-right::-webkit-scrollbar-thumb{background:#D0CCC6;border-radius:2px}
.geo-transit-card{background:#FFF8E1;border-left:4px solid var(--warm);border-radius:0 8px 8px 0;padding:16px 18px}
.geo-transit-card h4{font:700 13px var(--sans);color:#8B5000;margin-bottom:10px}
.geo-tr-row{display:flex;gap:10px;align-items:center;margin-bottom:5px;font:400 12px var(--sans);color:var(--ink2)}
.geo-badge{background:#BF5800;color:#fff;border-radius:3px;padding:2px 7px;font:500 10px var(--mono);flex-shrink:0}
.geo-place-item{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;position:relative}
.geo-num{width:26px;height:26px;background:var(--ink);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 12px var(--sans);flex-shrink:0}
.geo-thumb{width:64px;height:42px;border-radius:4px;overflow:hidden;flex-shrink:0}
.geo-thumb img{width:100%;height:100%}
.geo-place-name{font:700 13px var(--sans);color:var(--ink);margin-bottom:2px}
.geo-place-sub{font:400 11px var(--sans);color:var(--ink3);line-height:1.5}

/* ── FOOD ── */
.food-body{flex:1;display:flex;overflow:hidden}
.food-left{width:20%;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.food-map-area{flex:1;min-height:0}
.food-tips{padding:14px;border-top:1px solid var(--border);flex-shrink:0}
.food-tips h5{font:500 10px var(--mono);letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-bottom:8px}
.food-tip-item{display:flex;gap:6px;margin-bottom:5px;font:400 11px var(--sans);color:var(--ink2);line-height:1.5}
.food-tip-item::before{content:'✦';color:var(--warm);flex-shrink:0;font-size:9px;margin-top:2px}
.food-right{flex:1;min-width:0;padding:14px 32px;overflow:hidden;display:flex;flex-direction:column;gap:10px;box-sizing:border-box}
.food-right::-webkit-scrollbar{width:4px}
.food-right::-webkit-scrollbar-thumb{background:#D0CCC6;border-radius:2px}
.food-node{background:#fff;border:1px solid var(--border);border-radius:10px;display:flex;overflow:hidden;flex-shrink:0;position:relative}
.food-node-img{width:140px;flex-shrink:0;overflow:hidden}
.food-node-img img{width:100%;height:100%}
.food-node-body{flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:5px;min-width:0}
.food-node-hdr{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.food-node-time{font:500 11px var(--mono);color:var(--accent);flex-shrink:0}
.food-node-name{font:700 16px var(--sans);color:var(--ink)}
.food-node-intro{font:400 12px var(--sans);color:var(--ink2);line-height:1.6;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.food-dishes{display:flex;flex-direction:column;gap:3px}
.food-dish-row{display:flex;align-items:center;gap:7px;font:400 12px var(--sans);color:var(--ink2)}
.food-dish-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.food-dish-note{font:400 11px var(--sans);color:var(--ink3)}
.food-footer{display:flex;gap:12px;font:400 11px var(--sans);color:var(--ink3);margin-top:auto;flex-wrap:wrap}
.food-price{font:500 11px var(--mono);color:var(--accent)}
.food-queue{background:#FFF3E0;color:#BF5800;border-radius:3px;padding:1px 7px;font:500 10px var(--sans)}
.food-need-rsv{background:#E8F0FE;color:#1D5FA6;border-radius:3px;padding:1px 7px;font:500 10px var(--sans)}
.food-mini{background:#fff;border:1px solid var(--border);border-radius:6px;display:flex;gap:10px;align-items:center;padding:8px 14px;flex-shrink:0}
.food-mini-time{font:500 11px var(--mono);color:var(--accent);min-width:48px}
.food-mini-name{font:700 13px var(--sans);color:var(--ink)}
.food-mini-intro{font:400 11px var(--sans);color:var(--ink3);flex:1;-webkit-line-clamp:1;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}

/* ── CULTURAL — 顶部地图横条 + 全宽卡片（与 Standard 空间结构完全不同）── */
.cult-map-strip{height:150px;flex-shrink:0;overflow:hidden;width:100%;position:relative}
.cult-map-strip-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to right,rgba(250,250,248,.5) 0%,transparent 25%);pointer-events:none;z-index:1}
.cult-map-date{position:absolute;top:14px;left:32px;z-index:2;font:700 12px var(--mono);color:var(--ink2);letter-spacing:.08em;background:rgba(250,250,248,.88);padding:4px 12px;border-radius:3px}
.cult-cards{flex:1;min-height:0;padding:12px 40px 8px;display:flex;flex-direction:column;gap:0;overflow:hidden;box-sizing:border-box}
.cult-card{background:#fff;border:1px solid var(--border);border-radius:10px;display:flex;overflow:hidden;flex-shrink:0;position:relative}
.cult-img{width:40%;flex-shrink:0;overflow:hidden;position:relative}
.cult-img img{width:100%;height:100%;object-fit:cover}
.cult-time-badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);color:#fff;border-radius:4px;padding:5px 12px;font:500 13px var(--mono);letter-spacing:.02em}
/* 文化页用 Serif 字体 — 博物馆导览质感 */
.cult-body-inner{flex:1;padding:20px 28px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.cult-name{font:700 20px/1.2 var(--serif);color:var(--ink);margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.cult-intro{font:400 12px var(--sans);color:var(--ink2);line-height:1.85;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;flex:1}
.cult-points{display:flex;gap:8px;flex-wrap:wrap;overflow:hidden;flex-shrink:0}
.cult-point{background:var(--bg2);border-radius:4px;padding:3px 10px;font:400 11px var(--sans);color:var(--ink2)}
.cult-footer{display:flex;gap:16px;font:400 11px var(--sans);color:var(--ink3);border-top:1px solid var(--border);padding-top:7px;flex-shrink:0}
.cult-price{font:500 11px var(--mono);color:var(--accent)}

/* ── OUTDOOR ── */
.outdoor-stats{height:80px;background:#2C3E50;display:flex;align-items:center;padding:0 48px;flex-shrink:0}
.stat-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.15)}
.stat-cell:last-child{border-right:none}
.stat-val{font:700 28px var(--mono);color:#fff}
.stat-lbl{font:400 10px var(--sans);letter-spacing:.15em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:2px}
.outdoor-body{flex:1;display:flex;overflow:hidden}
.outdoor-left{width:22%;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.outdoor-map-area{flex:1;min-height:0}
.outdoor-side{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.weather-card{background:#EBF3FF;border-radius:6px;padding:10px 12px;margin-bottom:10px;display:flex;gap:10px;align-items:center}
.weather-icon{font-size:22px;flex-shrink:0}
.weather-cond{font:700 13px var(--sans);color:#1D5FA6}
.weather-advice{font:400 10px var(--sans);color:#1D5FA6;opacity:.8;line-height:1.5;margin-top:2px}
.equip-list h5{font:500 10px var(--mono);letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-bottom:7px}
.equip-item{display:flex;gap:6px;margin-bottom:4px;font:400 11px var(--sans);color:var(--ink2);line-height:1.5}
.equip-item.req::before{content:'✓';color:#2E7D32;font-weight:700;flex-shrink:0}
.equip-item:not(.req)::before{content:'○';color:var(--ink3);flex-shrink:0}
.outdoor-right{flex:1;min-width:0;padding:18px 36px;overflow:hidden;display:flex;flex-direction:column;gap:12px;box-sizing:border-box}
.outdoor-right::-webkit-scrollbar{width:4px}
.outdoor-right::-webkit-scrollbar-thumb{background:#D0CCC6;border-radius:2px}
.outdoor-node{background:#fff;border:1px solid var(--border);border-radius:10px;display:flex;overflow:hidden;flex-shrink:0;position:relative}
.outdoor-node-img{width:140px;flex-shrink:0;overflow:hidden;position:relative}
.outdoor-node-img img{width:100%;height:100%}
.outdoor-seg{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:5px 8px}
.outdoor-seg .seg-dist{font:500 11px var(--mono);color:#fff}
.outdoor-seg .seg-time{font:400 10px var(--sans);color:rgba(255,255,255,.7)}
.outdoor-node-body{flex:1;padding:14px 20px;display:flex;flex-direction:column;gap:5px}
.outdoor-time{font:500 11px var(--mono);color:var(--accent)}
.outdoor-name{font:700 16px var(--sans);color:var(--ink)}
.outdoor-seg-info{font:500 12px var(--mono);color:var(--ink3)}
.outdoor-intro{font:400 12px var(--sans);color:var(--ink2);line-height:1.6;flex:1}
.outdoor-warning{background:#FFF3E0;border-left:3px solid #E67E22;border-radius:0 4px 4px 0;padding:5px 10px;font:400 11px var(--sans);color:#8B4513;margin-top:4px}
.outdoor-footer{display:flex;gap:14px;font:400 11px var(--sans);color:var(--ink3);margin-top:auto}
.outdoor-safety{height:40px;background:#F39C12;display:flex;align-items:center;padding:0 48px;font:500 12px var(--sans);color:#fff;flex-shrink:0}

/* ── EXTRAS ── */
.extras-header{height:56px;background:var(--ink);display:flex;align-items:center;padding:0 48px;gap:24px;flex-shrink:0}
.extras-header h2{font:700 20px var(--serif);color:#fff}
.tab-btn{background:none;border:none;color:#aaa;font:500 13px var(--sans);cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:#fff}
.extras-body{flex:1;overflow:hidden;position:relative}
.extras-tab{position:absolute;inset:0;display:none;padding:28px 48px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#D0CCC6 transparent}
.extras-tab::-webkit-scrollbar{width:4px}
.extras-tab::-webkit-scrollbar-thumb{background:#D0CCC6;border-radius:2px}
.extras-tab.active{display:block}
.extras-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}

.extra-card-name{font:700 14px var(--sans);color:var(--ink);margin-bottom:4px}

/* ── CHECKLIST ── */
.cl-header{height:56px;background:var(--ink);display:flex;align-items:center;padding:0 48px;flex-shrink:0}
.cl-header h2{font:700 20px var(--serif);color:#fff}
.cl-body{flex:1;padding:28px 48px;display:grid;grid-template-columns:1fr 1fr;gap:32px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#D0CCC6 transparent;background:var(--bg)}
.cl-body::-webkit-scrollbar{width:4px}
.cl-body::-webkit-scrollbar-thumb{background:#D0CCC6;border-radius:2px}
.cl-section h4{font:700 14px var(--sans);color:var(--ink);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--accent)}
.cl-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font:400 13px var(--sans);color:var(--ink2);line-height:1.6}
.cl-item input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);cursor:pointer}
.cl-urgent{color:var(--accent);font-weight:500}

@media print {

}

// ── 日类型推断 ────────────────────────────────────────────────────────────────
function inferDayType(day){
  const places = day.places || [];
  const nonTransit = places.filter(p => !['transit','hotel','free'].includes(p.type));
  const total = nonTransit.length || 1;
  const cnt = {
    food: places.filter(p => p.type && p.type.startsWith('meal_')).length,
    food_exp: places.filter(p => p.type === 'experience_food').length,
    cultural: places.filter(p => p.type === 'sight_cultural').length,
    nature: places.filter(p => p.type === 'sight_nature').length,
    outdoor: places.filter(p => p.type === 'experience_outdoor').length,
    intercity: places.filter(p => p.type === 'transit' && p.is_intercity).length
  };
  if(cnt.intercity > 0 || (day.cities && day.cities.length > 1)) return 'geographic';
  if(cnt.outdoor > 0 || cnt.nature / total >= 0.5) return 'outdoor';
  if(cnt.cultural / total >= 0.4 && total <= 4) return 'cultural';
  if((cnt.food + cnt.food_exp) / total >= 0.4 || cnt.food_exp > 0) return 'food';
  return 'standard';
}

// ── 交通衔接条 ─────────────────────────────────────────────────────────────────
function haversineKm(c1, c2){
  if(!c1||!c2) return null;
  const R=6371, r=Math.PI/180;
  const dLat=(c2[0]-c1[0])*r, dLng=(c2[1]-c1[1])*r;
  const a=Math.sin(dLat/2)**2+Math.cos(c1[0]*r)*Math.cos(c2[0]*r)*Math.sin(dLng/2)**2;
  return +(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1.35).toFixed(1);
}
function transitBar(p1, p2){
  const km = haversineKm(p1 && p1.coords, p2 && p2.coords);
  if(!km) return '';
  const dom = TRIP_DATA.is_domestic;
  let icon, mode, time;
  if(dom){
    if(km<2){icon='🚶';mode='步行';time=Math.round(km*14)+'分钟';}
    else if(km<5){icon='🚗';mode='开车';time=Math.round(km*5)+'分钟';}
    else{icon='🚗';mode='开车';time=Math.round(km*3+10)+'分钟';}
  } else {
    if(km<0.8){icon='🚶';mode='步行';time=Math.round(km*14)+'分钟';}
    else if(km<8){icon='🚇';mode='地铁/公交';time=Math.round(km*4+10)+'分钟（含候车）';}
    else{icon='🚇';mode='地铁换乘';time=Math.round(km*3+20)+'分钟（估算）';}
  }
  return `<div class="tr-bar"><span>${icon}</span><span class="tr-mode">${mode}</span><span class="tr-km">约${km}km</span><span class="tr-time">${time}</span><span class="tr-note">估算，以导航为准</span></div>`;
}

// ── 地图初始化 ─────────────────────────────────────────────────────────────────
const _mapsInit = {};
function initMap(mapId, places, zoom, dark){
  if(_mapsInit[mapId]) return;
  _mapsInit[mapId] = true;
  const div = document.getElementById(mapId);
  if(!div) return;
  const t = setTimeout(()=>{
    if(!div.classList.contains('leaflet-container'))
      div.innerHTML='<div class="map-fallback">地图加载中…<br>请确认网络连接</div>';
  }, 5000);
  const tile = dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  const map = L.map(mapId,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false});
  L.tileLayer(tile,{maxZoom:19}).addTo(map);
  map.on('load',()=>{ clearTimeout(t); div._mapOk=true; });
  const pts = (places||[]).filter(p=>p.coords);
  if(pts.length){
    pts.forEach((p,i)=>{
      L.marker(p.coords,{icon:L.divIcon({className:'',
        html:`<div style="width:22px;height:22px;background:#C0392B;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 11px sans-serif;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">${i+1}</div>`,
        iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map);
    });
    L.polyline(pts.map(p=>p.coords),{color:'#C0392B',weight:2,opacity:.65,dashArray:'4 3'}).addTo(map);
    map.fitBounds(L.polyline(pts.map(p=>p.coords)).getBounds().pad(0.3));
  } else {
    map.setView([35.68,139.69],12);
  }
}

// ── 页面系统 ──────────────────────────────────────────────────────────────────

function showPage(n){
  if(n<0||n>=totalPages) return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg = el('page-'+n);
  if(pg){
    pg.classList.add('active');
    if(pg._mapInit){ pg._mapInit(); pg._mapInit=null; }
  }
  currentPage = n;
  updateNav();
}
function queueMap(pg, fn){ pg._mapInit = fn; }
function updateNav(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentPage));
  el('page-label').textContent = `第 ${currentPage+1} 页 / 共 ${totalPages} 页`;
  el('nav-prev').style.opacity = currentPage===0?'.3':'1';
  el('nav-next').style.opacity = currentPage===totalPages-1?'.3':'1';
}
function buildDots(){
  const d = el('page-dots'); d.innerHTML='';
  for(let i=0;i<totalPages;i++){
    const dot = document.createElement('span');
    dot.className = 'dot'+(i===0?' active':'');
    dot.onclick=(n=>()=>showPage(n))(i);
    d.appendChild(dot);
  }
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') showPage(currentPage+1);
  if(e.key==='ArrowLeft') showPage(currentPage-1);
});
// Fit the fixed 1920×1080 canvas into any window (laptops are 1440/1512 logical px,
// so without scaling the right/bottom edges get clipped by overflow:hidden).
function fit(){
  const wrap=document.getElementById('pages-wrap');
  const stage=document.getElementById('stage');
  if(!wrap||!stage) return;
  const s=Math.min(stage.clientWidth/1920,stage.clientHeight/1080,1);
  wrap.style.transform='scale('+s+')';
}
window.addEventListener('resize',fit);
fit();

            <div class="extra-card-body">

              <span class="type-pill">${item.type||''}</span>
              <div class="extra-card-note">${item.note||''}</div>
            </div></div>`).join('')}</div>
      </div>
      <div class="extras-tab" id="etab-efood">
        <div class="extras-grid">${(s.extra_food||[]).map(item=>
          `<div class="extra-card">${item.image?`<img src="${item.image}" style="height:140px;width:100%">`:''}
            <div class="extra-card-body">
              <div class="extra-card-name">${mapLink(item.name)}</div>
              <div class="extra-card-note">${item.dish||''} · ${item.note||''}</div>
            </div></div>`).join('')}</div>
      </div>
      <div class="extras-tab" id="etab-souv">
        <div class="souvenir-list">${(s.souvenirs||[]).map(item=>
          `<div class="souvenir-row">
            <div class="sov-name">${item.name}</div>
            <div class="sov-note">${item.note||''}</div>
            <div class="sov-where">${mapLink(item.where||'')}</div>
            <div class="sov-price">${item.price||''}</div>
          </div>`).join('')}</div>
      </div>
    </div>`;
  return pg;
}
function switchTab(name, btn){
  document.querySelectorAll('.extras-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el('etab-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── P-CHECKLIST ───────────────────────────────────────────────────────────────
function buildChecklist(){
  const pg = mk('section');
  pg.innerHTML = `
    <div class="cl-header"><h2>出发前检查清单</h2></div>
    <div class="cl-body">
      <div class="cl-section">
        <h4>出发前必做</h4>
        ${['护照/证件有效期确认','机票/车票打印或截图','酒店确认单','需提前预约的门票/体验','签证/入境材料','保险购买','紧急联系人备案','当地交通卡/取现'].map(item=>
          `<div class="cl-item"><input type="checkbox"><span>${item}</span></div>`).join('')}
      </div>
      <div class="cl-section">
        <h4>行李核查</h4>
        ${['身份证件+副本','充电宝/充电线','适配器/转换插头','常备药品','换洗衣物','雨具','当地货币/银行卡','紧急联系卡（含酒店地址）'].map(item=>
          `<div class="cl-item"><input type="checkbox"><span>${item}</span></div>`).join('')}
      </div>
    </div>`;
  return pg;
}

// ── 主流程 ────────────────────────────────────────────────────────────────────
(function main(){
  if(!checkImages()) return;
  const wrap = el('pages-wrap');
  const pages = [];
  pages.push(buildCover());
  pages.push(buildOverview());
  TRIP_DATA.days.forEach(day=>{
    const t = inferDayType(day);
    const hasMust = (day.places||[]).some(p=>p.must_visit);
    const builders = {standard:buildStandard,geographic:buildGeographic,food:buildFood,cultural:buildCultural,outdoor:buildOutdoor};
    pages.push((builders[t]||buildStandard)(day, hasMust));
  });
  if(hasSupplementContent()) pages.push(buildExtras());
  pages.push(buildChecklist());
  pages.forEach((pg, i)=>{
    pg.id = 'page-'+i;
    pg.className = 'page';
    wrap.appendChild(pg);
  });
  totalPages = pages.length;
  buildDots();
  showPage(0);
  console.log('Day type inference:', TRIP_DATA.days.map(d=>`Day${d.day}: ${inferDayType(d)}`).join(', '));
  console.log('Total pages:', totalPages);
})();
</script>
